// ─── Constants & helpers ──────────────────────────────────────────────────────
const DAYS_S=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_F=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

// Term weeks: Week 1 = 19 Jan 2025 (Monday). Each week is 7 days.
const TERM_WEEK_1_START = new Date("2025-01-19T00:00:00");
const CW = 6; const TW = 11;

function termWeekStartDate(weekNum) {
  const d = new Date(TERM_WEEK_1_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}
function termWeekEndDate(weekNum) {
  const d = termWeekStartDate(weekNum);
  d.setDate(d.getDate() + 6);
  return d;
}
function fmtTermWeek(weekNum) {
  const s = termWeekStartDate(weekNum);
  const e = termWeekEndDate(weekNum);
  const fmt = d => `${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`;
  return `${fmt(s)} – ${fmt(e)}`;
}
// Get which term week a date string falls in (null if outside term)
function getTermWeekForDate(ds) {
  const d = new Date(ds + "T00:00:00");
  for (let w = 1; w <= TW; w++) {
    const s = termWeekStartDate(w);
    const e = termWeekEndDate(w);
    if (d >= s && d <= e) return w;
  }
  return null;
}

const R = 14;
function p2(n){return String(n).padStart(2,"0");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmtT(t){if(!t)return"";const[h,m]=t.split(":").map(Number);const ap=h>=12?"pm":"am";const hh=h%12||12;return m===0?`${hh}${ap}`:`${hh}.${p2(m)}${ap}`;}
function pT(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){return new Date(y,m,1).getDay();}
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function dateAdd(n){const d=new Date();d.setDate(d.getDate()+n);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function wdayDate(n){const d=new Date();const diff=(d.getDay()+6)%7;d.setDate(d.getDate()-diff+(n-1));return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds+"T00:00:00")-new Date(todayStr()+"T00:00:00"))/(86400000));}
function fmtCountdown(ds){const d=daysUntil(ds);if(d===null)return null;if(d<0)return{label:`${Math.abs(d)}d overdue`,color:"#c13b2e"};if(d===0)return{label:"due today",color:"#c13b2e"};if(d===1)return{label:"due tomorrow",color:"#e08030"};if(d<=7)return{label:`in ${d}d`,color:"#8a7050"};return null;}

// Returns all dates a recurring event falls on across a date range
function expandRecurring(ev, startDs, endDs) {
  if (!ev.recurring || !ev.recurringDays || ev.recurringDays.length === 0) return [];
  const results = [];
  const start = new Date(startDs + "T00:00:00");
  const end = new Date(endDs + "T00:00:00");
  const dayIdxMap = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  let cur = new Date(start);
  while (cur <= end) {
    const dayName = DAYS_S[cur.getDay()];
    if (ev.recurringDays.includes(dayName)) {
      results.push(`${cur.getFullYear()}-${p2(cur.getMonth()+1)}-${p2(cur.getDate())}`);
    }
    cur.setDate(cur.getDate() + 1);
  }
  return results;
}

// ─── getEventsForDate (handles recurring) ─────────────────────────────────────
function getEventsForDate(events, ds, visibleCalIds) {
  return events.filter(ev => {
    if (visibleCalIds && !visibleCalIds.includes(ev.calendarId)) return false;
    if (ev.recurring && ev.recurringDays && ev.recurringDays.length > 0) {
      const dayName = DAYS_S[new Date(ds + "T00:00:00").getDay()];
      return ev.recurringDays.includes(dayName);
    }
    if (ev.date === ds) return true;
    if (ev.isMultiDay && ev.multiDayEnd) return ds >= ev.date && ds <= ev.multiDayEnd;
    return false;
  }).sort((a,b) => pT(a.startTime) - pT(b.startTime));
}

// ─── Month View ───────────────────────────────────────────────────────────────

  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(d);
  function ds(d){return`${year}-${p2(month+1)}-${p2(d)}`;}
  function getItems(d){
    const s=ds(d);
    const evs=getEventsForDate(events,s,visibleCalIds);

      <div>

        {listTasks.map((t,i)=>{const cd=fmtCountdown(t.dueDate);return(
          <Card key={t.id} P={P} onClick={()=>{setEditTask(t);setShowModal(true);}} style={{marginBottom:7,padding:"12px 16px",borderLeft:`4px solid ${t.urgent?P.accent:P.border}`,animation:`slideUp 0.25s ease ${i*20}ms both`,opacity:t.done?0.5:1}}>

  );
}

// ─── Simple Lists ─────────────────────────────────────────────────────────────
function SimpleListsView({simpleLists,setSimpleLists,P,mobile}){
  const[active,setActive]=useState(()=>simpleLists[0]?.id||null);
  const[newItemText,setNewItemText]=useState("");
  const[newListName,setNewListName]=useState("");const[addingList,setAddingList]=useState(false);
  const al=simpleLists.find(l=>l.id===active);
  function addItem(){if(!newItemText.trim()||!active)return;setSimpleLists(p=>p.map(l=>l.id===active?{...l,items:[...l.items,{id:Date.now().toString(),text:newItemText.trim(),done:false}]}:l));setNewItemText("");}
  function toggleItem(lid,iid){setSimpleLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.map(it=>it.id===iid?{...it,done:!it.done}:it)}:l));}
  function delItem(lid,iid){setSimpleLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.filter(it=>it.id!==iid)}:l));}
  function addList(){if(!newListName.trim())return;const nl={id:Date.now().toString(),name:newListName.trim(),items:[]};setSimpleLists(p=>[...p,nl]);setActive(nl.id);setNewListName("");setAddingList(false);}
  function delList(id){setSimpleLists(p=>p.filter(l=>l.id!==id));if(active===id)setActive(simpleLists.find(l=>l.id!==id)?.id||null);}
  const done=al?.items.filter(i=>i.done).length||0;const total=al?.items.length||0;const pct=total?Math.round(done/total*100):0;
  return(
    <div style={{display:mobile?"block":"grid",gridTemplateColumns:"200px 1fr",gap:22,animation:"slideUp 0.3s ease both"}}>
      <div style={{marginBottom:mobile?14:0}}>
        {mobile?(
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
            {simpleLists.map(l=><button key={l.id} onClick={()=>setActive(l.id)} style={{flexShrink:0,background:active===l.id?P.accent:"transparent",color:active===l.id?"#fff":P.ink2,border:`1.5px solid ${active===l.id?P.accent:P.border2}`,borderRadius:20,padding:"6px 16px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,transition:"all 0.15s",whiteSpace:"nowrap"}}>{l.name}</button>)}
            <button onClick={()=>setAddingList(true)} style={{flexShrink:0,background:"transparent",border:`1.5px dashed ${P.border2}`,borderRadius:20,padding:"6px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3}}>+</button>
          </div>
        ):(
          <>
            <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>My Lists</div>
            {simpleLists.map(l=>(
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                <button onClick={()=>setActive(l.id)} style={{flex:1,textAlign:"left",background:active===l.id?P.accentLight:"transparent",color:active===l.id?P.accent:P.ink2,border:`1.5px solid ${active===l.id?P.accentMid:"transparent"}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{l.name}</span>
                  {l.items.length>0&&<span style={{fontSize:10,color:active===l.id?P.accent:P.ink3}}>{Math.round(l.items.filter(x=>x.done).length/l.items.length*100)}%</span>}
                </button>
                <button onClick={()=>delList(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
              </div>
            ))}
            {addingList?<div style={{display:"flex",gap:5,marginTop:5}}><Inp autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name..." style={{flex:1,fontSize:12}} P={P}/><Btn onClick={addList} small P={P}>+</Btn></div>
            :<button onClick={()=>setAddingList(true)} style={{width:"100%",marginTop:5,background:"transparent",border:`1.5px dashed ${P.border2}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3,transition:"all 0.12s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink3;}}>+ new list</button>}
          </>
        )}
        {addingList&&mobile&&<div style={{display:"flex",gap:6,marginTop:8}}><Inp autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name..." style={{flex:1,fontSize:12}} P={P}/><Btn onClick={addList} small P={P}>+</Btn></div>}
      </div>
      <div>
        {!al&&<Card P={P} noHover style={{textAlign:"center",padding:40,color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif",fontStyle:"italic"}}>Create a list to get started.</Card>}
        {al&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

            {total>0&&<div style={{fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{done}/{total}</div>}
          </div>
          {total>0&&<ProgBar pct={pct} color={P.accent} P={P} style={{marginBottom:14}}/>}
          {al.items.map((it,i)=>(
            <Card key={it.id} P={P} noHover style={{marginBottom:6,padding:"11px 14px",borderLeft:`3px solid ${it.done?P.border:P.navy}`,opacity:it.done?0.55:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Check checked={it.done} onChange={()=>toggleItem(al.id,it.id)} color={P.navy} P={P}/>
                <span style={{flex:1,fontSize:mobile?13:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",textDecoration:it.done?"line-through":"none",fontWeight:500}}>{it.text}</span>
                <button onClick={()=>delItem(al.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
              </div>
            </Card>
          ))}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <Inp value={newItemText} onChange={e=>setNewItemText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder={`Add to ${al.name}…`} P={P}/>
            <Btn onClick={addItem} P={P} small={mobile}>Add</Btn>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ─── Course Tracker ───────────────────────────────────────────────────────────
function CourseTracker({P,mobile,tasks,setTasks}){
  const[courses,setCourses]=useState(()=>lsGet("courses8",DEF_COURSES));
  const[checks,setChecks]=useState(()=>lsGet("courseChecks8",{}));
  const[cNotes,setCNotes]=useState(()=>lsGet("courseNotes8",{}));
  const[view,setView]=useState("course");
  const[activeWk,setActiveWk]=useState(CW);
  const[activeCourse,setActiveCourse]=useState(()=>lsGet("courses8",DEF_COURSES)[0]?.id||"");
  const[addingCourse,setAddingCourse]=useState(false);
  const[newCourse,setNewCourse]=useState({code:"",name:"",color:P.accent,columns:["Watched Lecture","Done Readings"]});
  const[editCourse,setEditCourse]=useState(null);
  const[addingColFor,setAddingColFor]=useState(null);
  const[newColText,setNewColText]=useState("");
  const CCOLS=[P.accent,P.navy,"#3a7a5a","#7a4a6a","#7a6a1a","#1a6a7a","#c9a84c","#7a3a1a"];
  useEffect(()=>{lsSave("courses8",courses);},[courses]);
  useEffect(()=>{lsSave("courseChecks8",checks);},[checks]);
  useEffect(()=>{lsSave("courseNotes8",cNotes);},[cNotes]);

  function tog(wk,cid,col){
    const k=`${wk}|${cid}|${col}`;
    setChecks(p=>({...p,[k]:!p[k]}));
  }
  function getN(wk,cid){return cNotes[`${wk}|${cid}`]||"";}
  function setN(wk,cid,v){setCNotes(p=>({...p,[`${wk}|${cid}`]:v}));}
  function addCol(cid){if(!newColText.trim())return;setCourses(p=>p.map(c=>c.id===cid?{...c,columns:[...c.columns,newColText.trim()]}:c));setNewColText("");setAddingColFor(null);}
  function remCol(cid,col){setCourses(p=>p.map(c=>c.id===cid?{...c,columns:c.columns.filter(x=>x!==col)}:c));}
  function saveCourse(){if(editCourse){setCourses(p=>p.map(c=>c.id===editCourse.id?editCourse:c));setEditCourse(null);}else if(newCourse.code.trim()){setCourses(p=>[...p,{...newCourse,id:Date.now().toString()}]);setNewCourse({code:"",name:"",color:P.accent,columns:["Watched Lecture","Done Readings"]});setAddingCourse(false);}}
  const weeks=Array.from({length:TW},(_,i)=>i+1);
  const acd=courses.find(c=>c.id===activeCourse)||courses[0]||null;
  function cPct(c){let t=0,d=0;weeks.forEach(w=>{c.columns.forEach(col=>{t++;if(checks[`${w}|${c.id}|${col}`])d++;});});return t?Math.round(d/t*100):0;}
  function wPct(wk){let t=0,d=0;courses.forEach(c=>{c.columns.forEach(col=>{t++;if(checks[`${wk}|${c.id}|${col}`])d++;});});return t?Math.round(d/t*100):0;}

  // (course items are shown in week panel only, not in tasks array)

  const OV2=mkOV(mobile);const MB2=mkMB(P,mobile);

  const ColToggleRow=({c,wk})=>(
    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
      {c.columns.map(col=>{const k=`${wk}|${c.id}|${col}`,done=checks[k];return(
        <div key={col} onClick={()=>tog(wk,c.id,col)} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",padding:"5px 11px",borderRadius:20,background:done?c.color+"18":P.bg2,border:`1.5px solid ${done?c.color:P.border}`,transition:"all 0.15s"}}>
          <Check checked={!!done} onChange={()=>tog(wk,c.id,col)} color={c.color} P={P}/>
          <span style={{fontSize:mobile?11:12,color:done?c.color:P.ink2,fontFamily:"'DM Sans',sans-serif",fontWeight:done?600:400}}>{col}</span>
        </div>
      );})}
      {addingColFor===c.id?<div style={{display:"flex",gap:5,alignItems:"center"}}><Inp value={newColText} onChange={e=>setNewColText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCol(c.id)} placeholder="Column…" style={{fontSize:11,width:120,padding:"5px 9px"}} P={P}/><Btn onClick={()=>addCol(c.id)} small P={P}>+</Btn><button onClick={()=>{setAddingColFor(null);setNewColText("");}} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13}}>✕</button></div>
      :<button onClick={()=>setAddingColFor(c.id)} style={{background:"none",border:`1.5px dashed ${P.border2}`,borderRadius:20,padding:"4px 10px",cursor:"pointer",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif",transition:"all 0.12s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=c.color} onMouseLeave={e=>e.currentTarget.style.borderColor=P.border2}>+ col</button>}
    </div>

      </div>

            </div>):(

                <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>

              </div>
            );})}
          </>)}
          {tkRes.length>0&&(<><div style={{padding:"8px 18px 3px",fontSize:10,fontWeight:700,color:P.ink3,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Tasks</div>

                <Check checked={t.done} onChange={()=>{}} color={t.urgent?P.accent:P.navy} P={P}/>

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const{w}=useWindowSize(); const mobile=w<768;
  const[dark,setDark]=useState(()=>lsGet("dark8",false));
  const[accent,setAccent]=useState(()=>lsGet("accent8","#c13b2e"));
  const P=makeP(dark,accent);
  const[tab,setTab]=useState("month");
  const[year,setYear]=useState(()=>new Date().getFullYear());
  const[month,setMonth]=useState(()=>new Date().getMonth());
  const[events,setEvents]=useState(()=>lsGet("events8",makeDemoEvents()));
  const[tasks,setTasks]=useState(()=>{const t=lsGet("tasks8",makeDemoTasks());return t.filter(x=>!x.isCourseTask);});
  const[simpleLists,setSimpleLists]=useState(()=>lsGet("simpleLists8",makeDemoSimpleLists()));
  const[calendars,setCalendars]=useState(()=>lsGet("calendars8",DEF_CALS));
  const[showEventModal,setShowEventModal]=useState(false);
  const[editEvent,setEditEvent]=useState(null);
  const[prefillDate,setPrefillDate]=useState(null);
  const[weekOffset,setWeekOffset]=useState(0);
  const[highlightDate,setHighlightDate]=useState(null);
  const[showAddTask,setShowAddTask]=useState(false);
  const[editWeekTask,setEditWeekTask]=useState(null);
  const[showSearch,setShowSearch]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[tabKey,setTabKey]=useState(0);
  const[syncing,setSyncing]=useState(false);
  const[loaded,setLoaded]=useState(true); // render immediately, sync in background
  const sbReady=useRef(false); // true once initial Supabase load completes

  useEffect(()=>{lsSave("events8",events);if(sbReady.current)sched("events8",events);},[events]);
  useEffect(()=>{lsSave("tasks8",tasks);if(sbReady.current)sched("tasks8",tasks);},[tasks]);
  useEffect(()=>{lsSave("simpleLists8",simpleLists);if(sbReady.current)sched("simpleLists8",simpleLists);},[simpleLists]);
  useEffect(()=>{lsSave("calendars8",calendars);if(sbReady.current)sched("calendars8",calendars);},[calendars]);
  useEffect(()=>{lsSave("dark8",dark);if(sbReady.current)sbSetSetting("dark8",String(dark));},[dark]);
  useEffect(()=>{lsSave("accent8",accent);if(sbReady.current)sbSetSetting("accent8",accent);},[accent]);

  const syncT=useRef(null);
  function sched(key,data){clearTimeout(syncT.current);syncT.current=setTimeout(async()=>{setSyncing(true);await sbUpsert(key,data);setSyncing(false);},1400);}

  useEffect(()=>{
    // Load from localStorage immediately (already done via useState defaults)
    // Then try Supabase in background with a strict 5s timeout per request
    sbReady.current = true; // allow saves immediately
    async function syncFromCloud(){
      try {
        const withTimeout = (p) => Promise.race([p, new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),5000))]);
        const [ev,tk,sl,ca,d,ac] = await Promise.all([
          withTimeout(sbGet("events8")), withTimeout(sbGet("tasks8")),
          withTimeout(sbGet("simpleLists8")), withTimeout(sbGet("calendars8")),
          withTimeout(sbGetSetting("dark8")), withTimeout(sbGetSetting("accent8")),
        ]);
        // Only overwrite local if cloud has more recent data (non-empty)
        if(ev && ev.length > 0) setEvents(ev);
        if(tk && tk.length > 0) setTasks(tk.filter(t=>!t.isCourseTask));
        if(sl && sl.length > 0) setSimpleLists(sl);
        if(ca && ca.length > 0) setCalendars(ca);
        if(d !== null) setDark(d==="true");
        if(ac) setAccent(ac);
      } catch(e){ /* Supabase unavailable, keep local data */ }
    }
    syncFromCloud();
  },[]);

  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key==="n"||e.key==="N"){if(tab==="tasks")setShowAddTask(true);else{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}}
      if((e.key==="/")||(e.key==="k"&&(e.metaKey||e.ctrlKey))){e.preventDefault();setShowSearch(true);}
      if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);}
    }
    window.addEventListener("keydown",onKey);return()=>window.removeEventListener("keydown",onKey);
  },[tab]);

  function switchTab(t){setTab(t);setTabKey(k=>k+1);}
  function doReset(){
    ["events8","tasks8","simpleLists8","calendars8","taskLists8","courseChecks8","courseNotes8","courses8","checks8","cnotes8"].forEach(k=>localStorage.removeItem(k));
    setEvents([]);setTasks([]);setSimpleLists([]);setCalendars([]);setShowSettings(false);
  }
  function getWeekStart(off){const now=new Date();const s=new Date(now);s.setDate(now.getDate()-now.getDay()+off*7);s.setHours(0,0,0,0);return s;}
  const weekStart=getWeekStart(weekOffset);
  function handleDayClick(ds){
    const cl=new Date(ds+"T00:00:00"),now=new Date();now.setHours(0,0,0,0);
    const tSun=new Date(now);tSun.setDate(now.getDate()-now.getDay());tSun.setHours(0,0,0,0);
    const cSun=new Date(cl);cSun.setDate(cl.getDate()-cl.getDay());cSun.setHours(0,0,0,0);
    setWeekOffset(Math.round((cSun-tSun)/(7*86400000)));setHighlightDate(ds);switchTab("week");
  }
  function saveEvent(f){setEvents(p=>{const e=p.find(x=>x.id===f.id);return e?p.map(x=>x.id===f.id?f:x):[...p,f];});setShowEventModal(false);setEditEvent(null);setPrefillDate(null);}
  function delEvent(id){setEvents(p=>p.filter(e=>e.id!==id));setShowEventModal(false);setEditEvent(null);}
  function defLists(){try{return JSON.parse(localStorage.getItem("taskLists8"))||[{id:"list1",name:"Uni"},{id:"list2",name:"Life"}];}catch{return[{id:"list1",name:"Uni"},{id:"list2",name:"Life"}];}}
  function wkLabel(){const ws=weekStart,we=new Date(ws);we.setDate(ws.getDate()+6);return`${ws.getDate()} ${MONTHS[ws.getMonth()].slice(0,3)} – ${we.getDate()} ${MONTHS[we.getMonth()].slice(0,3)}, ${ws.getFullYear()}`;}

  const urgentCount=tasks.filter(t=>!t.done&&!t.isCourseTask&&(t.urgent||(t.dueDate&&daysUntil(t.dueDate)<0))).length;

  // Course tasks computed live from checks — only for week panel display
  const courseTasks = (() => {
    const result = [];
    for(let w=1; w<=TW; w++){
      const end = termWeekEndDate(w);
      const dueDateStr = `${end.getFullYear()}-${p2(end.getMonth()+1)}-${p2(end.getDate())}`;
      courses.forEach(c => {
        c.columns.forEach(col => {
          if (!checks[`${w}|${c.id}|${col}`]) {
            result.push({
              id: `ct-${w}-${c.id}-${col}`,
              title: `${c.code}: ${col}`,
              notes: `Week ${w} · ${fmtTermWeek(w)}`,
              dueDate: dueDateStr,
              courseColor: c.color,
              courseId: c.id,
              weekNum: w,
              urgent: w <= CW,
            });
          }
        });
      });
    }
    return result;
  })();


  // Visible calendars list for sidebar toggle
  const visibleCalIds=calendars.filter(c=>c.visible!==false).map(c=>c.id);

  const TABS=[
    {id:"month",label:"Month",Icon:Icons.Month},
    {id:"week",label:"Week",Icon:Icons.Week},
    {id:"tasks",label:"Tasks",Icon:Icons.Tasks,badge:urgentCount>0?urgentCount:null},
    {id:"lists",label:"Lists",Icon:Icons.Lists},
    {id:"courses",label:"Courses",Icon:Icons.Courses},
  ];

  // ── Calendar toggle sidebar ──────────────────────────────────────────────────
  const CalSidebar = () => (
    <div style={{width:220,background:P.white,borderRadius:R,border:`1px solid ${P.border}`,padding:16,flexShrink:0,boxShadow:`0 4px 20px ${P.shadow}`,animation:"slideUp 0.25s ease both",alignSelf:"flex-start"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:14,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Calendars</div>
      </div>
      {calendars.map(c=>(
        <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9,cursor:"pointer",padding:"5px 6px",borderRadius:8,transition:"background 0.12s"}} onClick={()=>setCalendars(p=>p.map(x=>x.id===c.id?{...x,visible:x.visible===false?true:false}:x))} onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{width:14,height:14,borderRadius:4,background:c.visible!==false?c.color:"transparent",border:`2px solid ${c.color}`,flexShrink:0,transition:"background 0.15s"}}/>
          <span style={{flex:1,fontSize:13,fontFamily:"'DM Sans',sans-serif",color:c.visible!==false?P.ink:P.ink3,textDecoration:c.visible===false?"line-through":"none"}}>{c.name}</span>
          <input type="color" value={c.color} onChange={e=>setCalendars(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} onClick={e=>e.stopPropagation()} style={{width:18,height:18,border:"none",background:"none",cursor:"pointer",padding:0}}/>
        </div>
      ))}
      <button onClick={()=>setCalendars(p=>p.map(c=>({...c,visible:true})))} style={{fontSize:11,color:P.ink3,background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:4}}>Show all</button>
    </div>
  );

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:P.bg,minHeight:"100vh",color:P.ink,transition:"background 0.3s,color 0.3s",display:"flex"}}>
      <style>{`
        *{box-sizing:border-box;}
        @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
        @keyframes slideInRight{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:none;}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${P.border2};border-radius:3px;}
        .day-add{opacity:0!important;}
        div:hover>.day-add{opacity:1!important;}
        ::placeholder{color:${P.ink3};opacity:0.5;}
        input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
        button:active{transform:scale(0.96);}
        select option{background:${P.bg};color:${P.ink};}
        html{-webkit-tap-highlight-color:transparent;}
        body{overflow:hidden;}
      `}</style>

      {/* ── Desktop vertical left sidebar ── */}
      {!mobile&&(
        <div style={{width:64,flexShrink:0,background:P.white,borderRight:`1px solid ${P.border}`,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:16,paddingBottom:16,gap:4,height:"100vh",position:"sticky",top:0,zIndex:100}}>
          <div style={{marginBottom:20}}><AppIcon size={32}/></div>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} title={t.label}
              style={{position:"relative",width:44,height:44,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,background:tab===t.id?P.accentLight:"transparent",border:"none",borderRadius:12,cursor:"pointer",color:tab===t.id?P.accent:P.ink3,transition:"all 0.15s"}}
              onMouseEnter={e=>{if(tab!==t.id){e.currentTarget.style.background=P.bg2;e.currentTarget.style.color=P.ink2;}}}
              onMouseLeave={e=>{if(tab!==t.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color=P.ink3;}}}>
              <t.Icon size={20} color={tab===t.id?P.accent:undefined}/>
              {t.badge&&<span style={{position:"absolute",top:4,right:4,background:P.accent,color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button onClick={()=>setShowSearch(true)} title="Search" style={{width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",borderRadius:12,cursor:"pointer",color:P.ink3,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.background=P.bg2;e.currentTarget.style.color=P.ink2;}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=P.ink3;}}>
            <Icons.Search size={20}/>
          </button>
          <button onClick={()=>setShowSettings(true)} title="Settings" style={{width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",borderRadius:12,cursor:"pointer",color:P.ink3,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.background=P.bg2;e.currentTarget.style.color=P.ink2;}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=P.ink3;}}>
            <Icons.Settings size={20}/>
          </button>
        </div>
      )}

      {/* ── Main content area ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {/* Top bar (desktop) — for cal nav + event button */}
        {!mobile&&(
          <div style={{background:P.white,borderBottom:`1px solid ${P.border}`,padding:"10px 22px",display:"flex",alignItems:"center",gap:10,flexShrink:0,boxShadow:`0 1px 4px ${P.shadow}`}}>
            <div style={{fontSize:15,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",marginRight:8}}>{TABS.find(t=>t.id===tab)?.label}</div>
            {(tab==="month"||tab==="week")&&(<>
              {tab==="month"&&(<>
                <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
                <div style={{fontSize:16,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:180,textAlign:"center"}}>{MONTHS[month]} {year}</div>
                <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
                <Btn onClick={()=>{setMonth(new Date().getMonth());setYear(new Date().getFullYear());}} variant="ghost" small P={P}>Today</Btn>
              </>)}
              {tab==="week"&&(<>
                <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
                <div style={{fontSize:15,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:240,textAlign:"center"}}>{wkLabel()}</div>
                <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
                <Btn onClick={()=>{setWeekOffset(0);setHighlightDate(null);}} variant="ghost" small P={P}>This Week</Btn>
              </>)}
              <div style={{flex:1}}/>
              <Btn onClick={()=>{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}} P={P} small>+ Event</Btn>
            </>)}
            {(tab==="tasks")&&<div style={{flex:1}}/>}
            <div style={{fontSize:10,color:P.ink3,fontFamily:"'DM Sans',sans-serif",marginLeft:"auto"}}><kbd style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:4,padding:"1px 5px",fontSize:10}}>N</kbd> add · <kbd style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:4,padding:"1px 5px",fontSize:10}}>/</kbd> search</div>
          </div>
        )}

        {/* Scrollable content */}
        <div style={{flex:1,overflowY:"auto",padding:mobile?"14px 14px 80px":"20px 22px",display:"flex",gap:18}}>
          {/* Calendar visibility sidebar (month + week only) */}
          {!mobile&&(tab==="month"||tab==="week")&&<CalSidebar/>}

          <div style={{flex:1,minWidth:0}}>
            {/* Mobile header */}
            {mobile&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><AppIcon/><span style={{fontSize:16,fontWeight:800,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:"-0.02em"}}>Planner</span></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,display:"flex",alignItems:"center",padding:4}}><Icons.Search size={20} color={P.ink3}/></button>
                  <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,display:"flex",alignItems:"center",padding:4}}><Icons.Settings size={20} color={P.ink3}/></button>
                  {(tab==="month"||tab==="week")&&<Btn onClick={()=>{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}} P={P} small>+ Event</Btn>}
                </div>
              </div>
            )}
            {mobile&&(tab==="month"||tab==="week")&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                {tab==="month"&&(<>
                  <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                  <div style={{flex:1,fontSize:15,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center"}}>{MONTHS[month].slice(0,3)} {year}</div>
                  <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                  <button onClick={()=>{setMonth(new Date().getMonth());setYear(new Date().getFullYear());}} style={{background:"none",border:`1px solid ${P.border2}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>Today</button>
                </>)}
                {tab==="week"&&(<>
                  <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                  <div style={{flex:1,fontSize:13,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center"}}>{wkLabel()}</div>
                  <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                </>)}
              </div>
            )}

            {tab==="month"&&<MonthView key={tabKey} year={year} month={month} events={events} tasks={tasks} calendars={calendars} onDayClick={handleDayClick} onEventClick={ev=>{setEditEvent(ev);setShowEventModal(true);}} onAddEvent={ds=>{setPrefillDate(ds);setEditEvent(null);setShowEventModal(true);}} P={P} mobile={mobile}/>}
            {tab==="week"&&<WeekView key={tabKey} weekStart={weekStart} events={events} tasks={tasks} calendars={calendars} highlightDate={highlightDate} onEventClick={ev=>{setEditEvent(ev);setShowEventModal(true);}} onAddEvent={ds=>{setPrefillDate(ds);setEditEvent(null);setShowEventModal(true);}} onTaskToggle={id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))} onTaskEdit={t=>setEditWeekTask(t)} onAddTask={()=>setShowAddTask(true)} P={P} mobile={mobile} courseTasks={courseTasks}/>}
            {tab==="tasks"&&<TasksView key={tabKey} tasks={tasks} setTasks={setTasks} P={P} mobile={mobile}/>}
            {tab==="lists"&&<SimpleListsView key={tabKey} simpleLists={simpleLists} setSimpleLists={setSimpleLists} P={P} mobile={mobile}/>}
            {tab==="courses"&&<CourseTracker key={tabKey} P={P} mobile={mobile} tasks={tasks} setTasks={setTasks}/>}
          </div>
        </div>
      </div>

      {/* ── Mobile bottom tab bar ── */}
      {mobile&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:P.white,borderTop:`1px solid ${P.border}`,display:"flex",zIndex:100,boxShadow:`0 -4px 20px ${P.shadow}`,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 4px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",transition:"all 0.15s"}}>
              <t.Icon size={22} color={tab===t.id?P.accent:P.ink3}/>
              <span style={{fontSize:9,fontWeight:tab===t.id?700:400,color:tab===t.id?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif",letterSpacing:"0.02em"}}>{t.label}</span>
              {tab===t.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:P.accent,borderRadius:"0 0 2px 2px"}}/>}
              {t.badge&&<span style={{position:"absolute",top:5,right:"18%",background:P.accent,color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
            </button>
          ))}
        </div>
      )}

      {showEventModal&&<EventModal event={editEvent||(prefillDate?{id:Date.now().toString(),title:"",calendarId:calendars[0]?.id||"",date:prefillDate,startTime:"",endTime:"",isSingleTime:false,location:"",notes:"",links:"",isMultiDay:false,multiDayEnd:"",showColorFill:false,urgent:false,done:false,recurring:false,recurringDays:[]}:null)} calendars={calendars} onSave={saveEvent} onDelete={delEvent} onClose={()=>{setShowEventModal(false);setEditEvent(null);setPrefillDate(null);}} P={P} mobile={mobile}/>}
      {showAddTask&&<TaskModal task={null} lists={defLists()} onSave={f=>{setTasks(p=>[...p,f]);setShowAddTask(false);}} onDelete={()=>{}} onClose={()=>setShowAddTask(false)} P={P} mobile={mobile}/>}
      {editWeekTask&&<TaskModal task={editWeekTask} lists={defLists()} onSave={f=>{setTasks(p=>p.map(t=>t.id===f.id?f:t));setEditWeekTask(null);}} onDelete={id=>{setTasks(p=>p.filter(t=>t.id!==id));setEditWeekTask(null);}} onClose={()=>setEditWeekTask(null)} P={P} mobile={mobile}/>}
      {showSearch&&<SearchBar events={events} tasks={tasks} calendars={calendars} onClose={()=>setShowSearch(false)} P={P} mobile={mobile}/>}
      {showSettings&&<SettingsPanel dark={dark} setDark={setDark} accent={accent} setAccent={setAccent} onReset={doReset} onClose={()=>setShowSettings(false)} P={P} mobile={mobile}/>}
      <SyncDot syncing={syncing} P={P}/>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
