function withTimeout(p,ms){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),ms))]);}
async function sbGet(id){try{const r=await withTimeout(fetch(SB_URL+"/rest/v1/planner_data?id=eq."+id+"&select=data",{headers:SBH}),5000);if(!r.ok)return null;const rows=await r.json();return rows.length?rows[0].data:null;}catch{return null;}}
async function sbSet(id,data){try{await withTimeout(fetch(SB_URL+"/rest/v1/planner_data",{method:"POST",headers:SBH,body:JSON.stringify({id,data,updated_at:new Date().toISOString()})}),5000);}catch{}}
async function sbGetS(k){try{const r=await withTimeout(fetch(SB_URL+"/rest/v1/settings?key=eq."+k+"&select=value",{headers:SBH}),5000);if(!r.ok)return null;const rows=await r.json();return rows.length?rows[0].value:null;}catch{return null;}}
async function sbSetS(k,v){try{await withTimeout(fetch(SB_URL+"/rest/v1/settings",{method:"POST",headers:SBH,body:JSON.stringify({key:k,value:v})}),5000);}catch{}}

// ── Helpers ─────────────────────────────────────────────────────────────────
const DAYS_S=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const TERM_START=new Date("2025-01-19T00:00:00");
const CW=6; const TW=11;
const R=12;

function p2(n){return String(n).padStart(2,"0");}
function today(){const d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}
function fmtT(t){if(!t)return"";const[h,m]=t.split(":").map(Number);const ap=h>=12?"pm":"am";const hh=h%12||12;return m===0?hh+ap:hh+"."+p2(m)+ap;}
function pT(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){return new Date(y,m,1).getDay();}
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000);}
function countdown(ds){const d=daysUntil(ds);if(d===null)return null;if(d<0)return{label:Math.abs(d)+"d overdue",c:"#c13b2e"};if(d===0)return{label:"today",c:"#c13b2e"};if(d===1)return{label:"tomorrow",c:"#e08030"};if(d<=7)return{label:"in "+d+"d",c:"#8a7050"};return null;}
function wkStart(n){const d=new Date(TERM_START);d.setDate(d.getDate()+(n-1)*7);return d;}
function wkEnd(n){const d=wkStart(n);d.setDate(d.getDate()+6);return d;}
function wkLabel(n){const s=wkStart(n),e=wkEnd(n);const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return s.getDate()+" "+mo[s.getMonth()]+" – "+e.getDate()+" "+mo[e.getMonth()];}
function wkDueStr(n){const e=wkEnd(n);return e.getFullYear()+"-"+p2(e.getMonth()+1)+"-"+p2(e.getDate());}
function useWinW(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return w;}

// ── Palette ──────────────────────────────────────────────────────────────────
function mkP(dark,accent){
  accent=accent||"#c13b2e";
  return dark?{
    bg:"#111318",bg2:"#1a1d24",bg3:"#22262f",card:"#1e2128",
    ink:"#f0ede8",ink2:"#a0a8b8",ink3:"#505870",
    accent:accent,al:accent+"30",am:accent+"55",
    navy:"#4a80c8",nl:"#141c2e",
    border:"#2a2e38",border2:"#343840",
    sh:"rgba(0,0,0,0.4)",sh2:"rgba(0,0,0,0.6)",
  }:{
    bg:"#f8f5f0",bg2:"#f0ece5",bg3:"#e8e3da",card:"#ffffff",
    ink:"#1a1714",ink2:"#5a534a",ink3:"#a09890",
    accent:accent,al:accent+"18",am:accent+"44",
    navy:"#1c2f5e",nl:"#e6eaf4",
    border:"#e5e0d8",border2:"#d5cfc5",
    sh:"rgba(26,23,20,0.07)",sh2:"rgba(26,23,20,0.12)",
  };
}
const ACCENTS=["#c13b2e","#1c2f5e","#2e7d4e","#7a4a6a","#c9853a","#1a6a7a","#5a4a8a","#c9a84c"];

// ── UI Atoms ─────────────────────────────────────────────────────────────────
function Card({children,style,onClick,P}){
  const[hov,setHov]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:P.card,borderRadius:R,padding:14,border:"1px solid "+P.border,
      boxShadow:hov&&onClick?"0 8px 24px "+P.sh2:"0 2px 8px "+P.sh,
      transition:"box-shadow 0.2s,transform 0.2s",transform:hov&&onClick?"translateY(-2px)":"none",
      cursor:onClick?"pointer":"default",...style}}>{children}</div>;
}

function Btn({children,onClick,v="primary",small,P,style,disabled}){
  const[hov,setHov]=useState(false);
  const sz=small?{fontSize:12,padding:"5px 13px"}:{fontSize:13,padding:"8px 18px"};
  const vs={
    primary:{background:disabled?"#ccc":P.accent,color:"#fff",border:"none",boxShadow:hov&&!disabled?"0 4px 14px "+P.accent+"55":"none"},
    ghost:{background:hov?P.bg2:"transparent",color:P.ink2,border:"1px solid "+P.border2},
    danger:{background:hov?P.al:"transparent",color:P.accent,border:"1px solid "+P.am},
  };
  return <button onClick={disabled?undefined:onClick} disabled={disabled}
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{display:"inline-flex",alignItems:"center",gap:5,borderRadius:9,cursor:disabled?"not-allowed":"pointer",
      fontFamily:"'DM Sans',sans-serif",fontWeight:600,transition:"all 0.15s",...sz,...vs[v],...style}}>{children}</button>;
}

function Inp({value,onChange,placeholder,type,style,rows,onKeyDown,P,autoFocus}){
  const s={width:"100%",padding:"8px 12px",border:"1px solid "+P.border2,borderRadius:9,fontSize:13,
    background:P.bg,color:P.ink,outline:"none",lineHeight:1.5,fontFamily:"'DM Sans',sans-serif",
    transition:"border-color 0.15s",...style};
  const fx=e=>e.target.style.borderColor=P.accent;
  const bl=e=>e.target.style.borderColor=P.border2;
  if(rows) return <textarea autoFocus={autoFocus} value={value} onChange={onChange} placeholder={placeholder}
    rows={rows} onKeyDown={onKeyDown} style={{...s,resize:"vertical"}} onFocus={fx} onBlur={bl}/>;
  return <input autoFocus={autoFocus} type={type||"text"} value={value} onChange={onChange}
    placeholder={placeholder} onKeyDown={onKeyDown} style={s} onFocus={fx} onBlur={bl}/>;
}

function Lbl({children,P}){return <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:4,fontFamily:"'DM Sans',sans-serif"}}>{children}</div>;}
function Pill({children,color,bg,style}){return <span style={{display:"inline-flex",alignItems:"center",background:bg||color+"22",color:color,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,...style}}>{children}</span>;}
function Bar({pct,color,P,style}){return <div style={{height:3,background:P.bg3,borderRadius:2,overflow:"hidden",...style}}><div style={{height:"100%",width:Math.min(pct,100)+"%",background:color||P.accent,borderRadius:2,transition:"width 0.5s"}}/></div>;}

function Check({checked,onChange,color,P}){
  return <div onClick={e=>{e.stopPropagation();onChange();}}
    style={{width:20,height:20,borderRadius:6,flexShrink:0,border:"2px solid "+(checked?color||P.accent:P.border2),
      background:checked?color||P.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
    {checked&&<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
  </div>;
}

function Sync({on,P}){
  if(!on)return null;
  return <div style={{position:"fixed",bottom:14,right:14,background:P.card,border:"1px solid "+P.border,borderRadius:9,padding:"5px 12px",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif",boxShadow:"0 4px 12px "+P.sh,zIndex:300,display:"flex",alignItems:"center",gap:6}}>
    <div style={{width:7,height:7,borderRadius:"50%",background:P.accent,animation:"pulse 1s infinite"}}/>Syncing…
  </div>;
}

// ── SVG Icons ─────────────────────────────────────────────────────────────────
const I={
  Star:({s=24})=><svg width={s} height={s} viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="white"/><polygon points="14,3 17.5,10.5 26,11.5 20,17 21.5,25.5 14,21.5 6.5,25.5 8,17 2,11.5 10.5,10.5" fill="#FFD700" stroke="#c13b2e" strokeWidth="1.8" strokeLinejoin="round"/></svg>,
  Month:({s=20,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="3" height="3" rx="0.5" fill={c} stroke="none"/><rect x="14" y="14" width="3" height="3" rx="0.5" fill={c} stroke="none"/></svg>,
  Week:({s=20,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="17" y2="15"/><line x1="7" y1="19" x2="13" y2="19"/></svg>,
  Tasks:({s=20,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>,
  Lists:({s=20,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill={c} stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill={c} stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill={c} stroke="none"/></svg>,
  Courses:({s=20,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>,
  Gear:({s=18,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  Search:({s=18,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Plus:({s=16,c="currentColor"})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
};

// ── Modal helpers ─────────────────────────────────────────────────────────────
function Overlay({children,onClose,P,mobile}){
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,
    display:"flex",alignItems:mobile?"flex-end":"center",justifyContent:"center",
    padding:mobile?0:20,backdropFilter:"blur(4px)",animation:"fadeIn 0.2s ease both"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:P.card,width:"100%",maxWidth:mobile?"100%":500,
      maxHeight:mobile?"92vh":"88vh",overflowY:"auto",borderRadius:mobile?"18px 18px 0 0":14,
      padding:"20px 22px 28px",boxShadow:mobile?"0 -8px 40px rgba(0,0,0,0.2)":"0 20px 60px rgba(0,0,0,0.2)",
      animation:"slideUp 0.25s ease both"}}>
      {mobile&&<div style={{width:36,height:4,borderRadius:2,background:P.border2,margin:"-6px auto 18px"}}/>}
      {children}
    </div>
  </div>;
}

function FR({label,children,P}){return <div style={{marginBottom:14}}><Lbl P={P}>{label}</Lbl>{children}</div>;}
function Sel({value,onChange,options,P}){
  return <select value={value} onChange={onChange} style={{width:"100%",padding:"8px 12px",border:"1px solid "+P.border2,borderRadius:9,fontSize:13,background:P.bg,color:P.ink,outline:"none",fontFamily:"'DM Sans',sans-serif"}}>
    {options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
  </select>;
}

// ── Event Modal ───────────────────────────────────────────────────────────────
function EventModal({ev,cals,onSave,onDel,onClose,P,mobile}){
  const init=ev||{id:Date.now()+"",title:"",calendarId:cals[0]?.id||"",date:today(),startTime:"",endTime:"",
    isSingleTime:false,location:"",notes:"",links:"",isMultiDay:false,multiDayEnd:"",
    showColorFill:false,urgent:false,done:false,recurring:false,recurringDays:[]};
  const[f,sf]=useState(init);
  // If no calendars exist, show a prompt to create one first
  if(cals.length===0) return <Overlay onClose={onClose} P={P} mobile={mobile}>
    <div style={{textAlign:"center",padding:"10px 0 20px"}}>
      <div style={{fontSize:18,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:8}}>No calendars yet</div>
      <div style={{fontSize:14,color:P.ink3,fontFamily:"'DM Sans',sans-serif",marginBottom:20,lineHeight:1.6}}>You need at least one calendar before adding events.<br/>Go to the sidebar and click <strong>Add calendar</strong>.</div>
      <Btn onClick={onClose} v="ghost" P={P}>Close</Btn>
    </div>
  </Overlay>;
  const set=(k,v)=>sf(p=>({...p,[k]:v}));
  const toggleDay=d=>set("recurringDays",f.recurringDays.includes(d)?f.recurringDays.filter(x=>x!==d):[...f.recurringDays,d]);
  return <Overlay onClose={onClose} P={P} mobile={mobile}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div style={{fontSize:18,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{ev?"Edit Event":"New Event"}</div>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:P.ink3}}>✕</button>
    </div>
    <FR label="Title" P={P}><Inp autoFocus value={f.title} onChange={e=>set("title",e.target.value)} placeholder="Event title…" P={P}/></FR>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <FR label="Calendar" P={P}><Sel value={f.calendarId} onChange={e=>set("calendarId",e.target.value)} options={cals.map(c=>({v:c.id,l:c.name}))} P={P}/></FR>
      <FR label="Date" P={P}><Inp type="date" value={f.date} onChange={e=>set("date",e.target.value)} P={P}/></FR>
    </div>
    <div style={{display:"flex",gap:14,marginBottom:14,flexWrap:"wrap"}}>
      {[["isSingleTime","Single time"],["isMultiDay","Multi-day"],["urgent","!! Urgent"],["done","Mark done"],["recurring","Recurring"]].map(([k,lb])=>
        <label key={k} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:k==="urgent"?P.accent:P.ink2,fontWeight:k==="urgent"?600:400,fontFamily:"'DM Sans',sans-serif"}}>
          <Check checked={!!f[k]} onChange={()=>set(k,!f[k])} color={k==="urgent"?P.accent:P.navy} P={P}/>{lb}
        </label>
      )}
    </div>
    {f.recurring&&<div style={{marginBottom:14}}>
      <Lbl P={P}>Repeat on</Lbl>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
        {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>
          <button key={d} onClick={()=>toggleDay(d)} style={{background:f.recurringDays.includes(d)?P.accent:P.bg2,color:f.recurringDays.includes(d)?"#fff":P.ink2,border:"1.5px solid "+(f.recurringDays.includes(d)?P.accent:P.border2),borderRadius:20,padding:"3px 11px",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:600,transition:"all 0.15s"}}>{d}</button>
        )}
      </div>
    </div>}
    {f.isMultiDay&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <FR label="End Date" P={P}><Inp type="date" value={f.multiDayEnd} onChange={e=>set("multiDayEnd",e.target.value)} P={P}/></FR>
      <FR label="" P={P}><label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:P.ink2,marginTop:18,fontFamily:"'DM Sans',sans-serif"}}><Check checked={!!f.showColorFill} onChange={()=>set("showColorFill",!f.showColorFill)} P={P}/>Fill colour</label></FR>
    </div>}
    {!f.isSingleTime&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <FR label="Start" P={P}><Inp type="time" value={f.startTime} onChange={e=>set("startTime",e.target.value)} P={P}/></FR>

// ── Month View ────────────────────────────────────────────────────────────────
function MonthView({year,month,events,tasks,cals,onDayClick,onEvClick,onAddEv,P,mobile}){
  const tot=dim(year,month),fst=fdm(year,month),td=today();
  const cells=[];
  for(let i=0;i<fst;i++)cells.push(null);
  for(let d=1;d<=tot;d++)cells.push(d);
  const visIds=new Set(cals.filter(c=>c.visible!==false).map(c=>c.id));
  function ds(d){return year+"-"+p2(month+1)+"-"+p2(d);}
  function getEvs(d){
    const s=ds(d);
    return events.filter(e=>{
      if(!visIds.has(e.calendarId))return false;
      if(e.date===s)return true;
      if(e.isMultiDay&&e.multiDayEnd)return s>=e.date&&s<=e.multiDayEnd;
      if(e.recurring&&e.recurringDays){const day=DAYS_S[new Date(s+"T00:00:00").getDay()];return e.recurringDays.includes(day)&&s!==e.date;}
      return false;
    }).sort((a,b)=>pT(a.startTime)-pT(b.startTime));
  }
  const minH=mobile?76:106;
  return <div style={{animation:"slideUp 0.3s ease both"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
      {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:mobile?9:11,fontWeight:600,color:P.ink3,padding:"3px 0",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>{mobile?d[0]:d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:mobile?2:4}}>
      {cells.map((d,i)=>{
        if(!d)return <div key={"e"+i} style={{minHeight:minH}}/>;
        const s=ds(d),isT=s===td;
        const evs=getEvs(d);
        const tks=tasks.filter(t=>t.dueDate===s&&!t.done);
        return <div key={i} onClick={()=>onDayClick(s)}
          style={{minHeight:minH,background:isT?P.al:P.card,borderRadius:mobile?9:R,border:"1.5px solid "+(isT?P.accent:P.border),padding:mobile?"4px 3px 3px":"7px 5px 5px",cursor:"pointer",position:"relative",transition:"all 0.18s"}}
          onMouseEnter={e=>{if(!isT&&!mobile){e.currentTarget.style.boxShadow="0 6px 20px "+P.sh2;e.currentTarget.style.transform="translateY(-2px)";}}}
          onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
          <div style={{fontSize:mobile?10:12,fontWeight:isT?700:400,color:isT?P.accent:P.ink3,textAlign:"right",marginBottom:3,fontFamily:"'DM Sans',sans-serif"}}>{d}</div>
          {!mobile&&evs.slice(0,3).map(ev=>{
            const cal=cals.find(c=>c.id===ev.calendarId),col=cal?cal.color:P.accent;
            const ts=ev.startTime&&ev.endTime?fmtT(ev.startTime)+"–"+fmtT(ev.endTime):ev.startTime?fmtT(ev.startTime):"";
            return <div key={ev.id} onClick={e=>{e.stopPropagation();onEvClick(ev);}}
              style={{fontSize:10,lineHeight:1.35,marginBottom:3,padding:"2px 5px",borderRadius:6,background:col+"15",color:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500,transition:"background 0.1s"}}
              onMouseEnter={e=>e.currentTarget.style.background=col+"30"} onMouseLeave={e=>e.currentTarget.style.background=col+"15"}>
              <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:col,marginRight:3,verticalAlign:"middle"}}/>
              {ev.recurring&&<span style={{fontSize:8,color:P.ink3,marginRight:2}}>↻</span>}
              {ts&&<span style={{color:P.ink3,marginRight:2,fontSize:9}}>{ts} </span>}
              {ev.title}
            </div>;
          })}
          {mobile&&evs.length>0&&<div style={{display:"flex",gap:2,flexWrap:"wrap",marginTop:2}}>{evs.slice(0,3).map(ev=>{const cal=cals.find(c=>c.id===ev.calendarId);return <div key={ev.id} style={{width:5,height:5,borderRadius:"50%",background:cal?cal.color:P.accent}}/>;})}</div>}
          {!mobile&&tks.slice(0,1).map(t=><div key={t.id} style={{fontSize:10,padding:"2px 5px",borderRadius:6,background:P.bg2,color:t.urgent?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>◦ {t.title}</div>)}
          {!mobile&&(evs.length+tks.length)>4&&<div style={{fontSize:9,color:P.ink3,textAlign:"right"}}>+{evs.length+tks.length-4}</div>}
          {!mobile&&<button onClick={e=>{e.stopPropagation();onAddEv(s);}} className="day-add"
            style={{position:"absolute",bottom:3,right:4,background:P.al,border:"1px solid "+P.am,borderRadius:5,cursor:"pointer",fontSize:13,color:P.accent,padding:"0px 6px",lineHeight:1.5,opacity:0,fontWeight:700}}>+</button>}
        </div>;
      })}
    </div>
  </div>;
}

// ── Simple Lists ──────────────────────────────────────────────────────────────
function ListsView({lists,setLists,P,mobile}){
  const[active,setActive]=useState(()=>lsGet("slists9",[{id:"sl1"}])[0]?.id||null);
  const[newItem,setNewItem]=useState("");
  const[newName,setNewName]=useState("");const[addL,setAddL]=useState(false);
  useEffect(()=>{lsSet("slists9",lists);},[lists]);
  const al=lists.find(l=>l.id===active)||null;
  function addItem(){if(!newItem.trim()||!active)return;setLists(p=>p.map(l=>l.id===active?{...l,items:[...l.items,{id:Date.now()+"",text:newItem.trim(),done:false}]}:l));setNewItem("");}
  function toggle(lid,iid){setLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.map(it=>it.id===iid?{...it,done:!it.done}:it)}:l));}
  function del(lid,iid){setLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.filter(it=>it.id!==iid)}:l));}
  function addList(){if(!newName.trim())return;const nl={id:Date.now()+"",name:newName.trim(),items:[]};setLists(p=>[...p,nl]);setActive(nl.id);setNewName("");setAddL(false);}
  function delList(id){setLists(p=>p.filter(l=>l.id!==id));if(active===id)setActive(lists.find(l=>l.id!==id)?.id||null);}
  const done=al?al.items.filter(i=>i.done).length:0;
  const tot=al?al.items.length:0;
  return <div style={{display:mobile?"block":"grid",gridTemplateColumns:"196px 1fr",gap:20,animation:"slideUp 0.3s ease both"}}>
    <div style={{marginBottom:mobile?14:0}}>
      {mobile?<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {lists.map(l=><button key={l.id} onClick={()=>setActive(l.id)} style={{flexShrink:0,background:active===l.id?P.accent:"transparent",color:active===l.id?"#fff":P.ink2,border:"1.5px solid "+(active===l.id?P.accent:P.border2),borderRadius:20,padding:"5px 15px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,whiteSpace:"nowrap"}}>{l.name}</button>)}
        <button onClick={()=>setAddL(true)} style={{flexShrink:0,background:"transparent",border:"1.5px dashed "+P.border2,borderRadius:20,padding:"5px 13px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3}}>+ list</button>
      </div>:<>
        <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>My Lists</div>
        {lists.map(l=><div key={l.id} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
          <button onClick={()=>setActive(l.id)} style={{flex:1,textAlign:"left",background:active===l.id?P.al:"transparent",color:active===l.id?P.accent:P.ink2,border:"1.5px solid "+(active===l.id?P.am:"transparent"),borderRadius:9,padding:"7px 11px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>{l.name}</span>
            {l.items.length>0&&<span style={{fontSize:10,color:active===l.id?P.accent:P.ink3}}>{Math.round(l.items.filter(x=>x.done).length/l.items.length*100)}%</span>}
          </button>
          <button onClick={()=>delList(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
        </div>)}
        {addL?<div style={{display:"flex",gap:4,marginTop:5}}><Inp autoFocus value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name…" P={P} style={{flex:1,fontSize:12}}/><Btn onClick={addList} small P={P}>+</Btn></div>
        :<button onClick={()=>setAddL(true)} style={{width:"100%",marginTop:5,background:"transparent",border:"1.5px dashed "+P.border2,borderRadius:9,padding:"7px 11px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3,transition:"all 0.12s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink3;}}>+ new list</button>}
      </>}
      {addL&&mobile&&<div style={{display:"flex",gap:6,marginTop:8}}><Inp autoFocus value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name…" P={P} style={{flex:1,fontSize:12}}/><Btn onClick={addList} small P={P}>+</Btn><button onClick={()=>setAddL(false)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:16}}>✕</button></div>}
    </div>
    <div>
      {!al&&<Card P={P} style={{textAlign:"center",padding:38,color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif",fontStyle:"italic"}}>Create a list to get started.</Card>}
      {al&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:mobile?17:21,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{al.name}</div>
          {tot>0&&<div style={{fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{done}/{tot} done</div>}
        </div>
        {tot>0&&<Bar pct={Math.round(done/tot*100)} color={P.accent} P={P} style={{marginBottom:14}}/>}
        {al.items.map((it,i)=><Card key={it.id} P={P} style={{marginBottom:5,padding:"10px 13px",borderLeft:"3px solid "+(it.done?P.border:P.navy),opacity:it.done?0.55:1,animation:"slideUp 0.2s ease "+(i*18)+"ms both"}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <Check checked={it.done} onChange={()=>toggle(al.id,it.id)} color={P.navy} P={P}/>
            <span style={{flex:1,fontSize:mobile?13:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",textDecoration:it.done?"line-through":"none",fontWeight:500}}>{it.text}</span>
            <button onClick={()=>del(al.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
          </div>
        </Card>)}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <Inp value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder={"Add to "+al.name+"…"} P={P}/>
          <Btn onClick={addItem} P={P} small={mobile}>Add</Btn>
        </div>
      </>}
    </div>
  </div>;
}

// ── Courses ───────────────────────────────────────────────────────────────────
function CoursesView({P,mobile,courses,setCourses,checks,setChecks}){
  const[notes,setNotes]=useState(()=>lsGet("cnotes9",{}));
  const[view,setView]=useState("course");
  const[activeWk,setActiveWk]=useState(CW);
  const[activeC,setActiveC]=useState(()=>courses[0]?.id||"");
  const[addingC,setAddingC]=useState(false);
  const[newC,setNewC]=useState({code:"",name:"",color:"#c13b2e",columns:["Watched Lecture","Done Readings"]});
  const[editC,setEditC]=useState(null);
  const[addColFor,setAddColFor]=useState(null);
  const[newCol,setNewCol]=useState("");
  const CCOLS=["#c13b2e","#1c2f5e","#2e7d4e","#7a4a6a","#c9853a","#1a6a7a","#c9a84c","#7a3a1a"];
  useEffect(()=>{lsSet("cnotes9",notes);},[notes]);
  const wks=Array.from({length:TW},(_,i)=>i+1);
  const ac=courses.find(c=>c.id===activeC)||courses[0]||null;
  function tog(w,cid,col){const k=w+"|"+cid+"|"+col;setChecks(p=>({...p,[k]:!p[k]}));}
  function getN(w,cid){return notes[w+"|"+cid]||"";}
  function setN(w,cid,v){setNotes(p=>({...p,[w+"|"+cid]:v}));}
  function cPct(c){let t=0,d=0;wks.forEach(w=>{c.columns.forEach(col=>{t++;if(checks[w+"|"+c.id+"|"+col])d++;});});return t?Math.round(d/t*100):0;}
  function wPct(w){let t=0,d=0;courses.forEach(c=>{c.columns.forEach(col=>{t++;if(checks[w+"|"+c.id+"|"+col])d++;});});return t?Math.round(d/t*100):0;}
  function addColTo(cid){if(!newCol.trim())return;setCourses(p=>p.map(c=>c.id===cid?{...c,columns:[...c.columns,newCol.trim()]}:c));setNewCol("");setAddColFor(null);}
  function remCol(cid,col){setCourses(p=>p.map(c=>c.id===cid?{...c,columns:c.columns.filter(x=>x!==col)}:c));}
  function saveC(){
    if(editC){setCourses(p=>p.map(c=>c.id===editC.id?editC:c));setEditC(null);}
    else if(newC.code.trim()){const nc={...newC,id:Date.now()+""};setCourses(p=>[...p,nc]);setActiveC(nc.id);setNewC({code:"",name:"",color:"#c13b2e",columns:["Watched Lecture","Done Readings"]});setAddingC(false);}
  }
  function delC(id){setCourses(p=>p.filter(c=>c.id!==id));setEditC(null);if(activeC===id)setActiveC(courses.find(c=>c.id!==id)?.id||"");}

  return <div style={{animation:"slideUp 0.3s ease both"}}>
    <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>

    </div>

    {view==="week"&&<div style={{display:mobile?"block":"grid",gridTemplateColumns:"175px 1fr",gap:18}}>
      <div style={{marginBottom:mobile?12:0}}>
        {mobile?<div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
          {wks.map(w=><button key={w} onClick={()=>setActiveWk(w)} style={{flexShrink:0,background:w===activeWk?P.accent:w===CW?P.al:"transparent",color:w===activeWk?"#fff":w===CW?P.accent:P.ink3,border:"1.5px solid "+(w===activeWk?P.accent:w===CW?P.am:P.border),borderRadius:20,padding:"4px 11px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,fontWeight:w===CW?600:400}}>{w===CW?"W"+w+" ←":"W"+w}</button>)}
        </div>:<>
          <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,fontFamily:"'DM Sans',sans-serif"}}>Term Weeks</div>
          {wks.map(w=><button key={w} onClick={()=>setActiveWk(w)} style={{width:"100%",textAlign:"left",background:w===activeWk?P.al:"transparent",color:w===activeWk?P.accent:w===CW?P.accent:P.ink2,border:"1.5px solid "+(w===activeWk?P.am:w===CW?P.am+"66":"transparent"),borderRadius:9,padding:"6px 10px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:w===activeWk?700:w===CW?600:400,transition:"all 0.15s",marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div>Week {w}{w===CW&&<span style={{fontSize:9,marginLeft:4,opacity:0.6}}> ← now</span>}</div><div style={{fontSize:10,color:w===activeWk?P.accent:P.ink3,fontWeight:400}}>{wkLabel(w)}</div></div>
            <span style={{fontSize:10,color:w===activeWk?P.accent:P.ink3}}>{wPct(w)}%</span>
          </button>)}
        </>}
      </div>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>

function SearchView({events,tasks,cals,onClose,P,mobile}){

  useEffect(()=>{ref.current&&ref.current.focus();},[]);
  const lq=q.toLowerCase();
  const evRes=q.length>1?events.filter(e=>(e.title||"").toLowerCase().includes(lq)||(e.notes||"").toLowerCase().includes(lq)):[];
  const tkRes=q.length>1?tasks.filter(t=>(t.title||"").toLowerCase().includes(lq)||(t.notes||"").toLowerCase().includes(lq)):[];
  return <Overlay onClose={onClose} P={P} mobile={mobile}>
    <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
      <I.Search s={17} c={P.ink3}/><input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search events and tasks…" onKeyDown={e=>e.key==="Escape"&&onClose()} style={{flex:1,border:"none",outline:"none",fontSize:15,color:P.ink,background:"transparent",fontFamily:"'DM Sans',sans-serif"}}/>

    {evRes.length>0&&<><div style={{fontSize:10,fontWeight:700,color:P.ink3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6,fontFamily:"'DM Sans',sans-serif"}}>Events</div>{evRes.map(ev=>{const cal=cals.find(c=>c.id===ev.calendarId);return <div key={ev.id} style={{padding:"8px 9px",display:"flex",gap:9,alignItems:"center",cursor:"pointer",borderRadius:8,transition:"background 0.1s"}} onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><div style={{width:8,height:8,borderRadius:"50%",background:cal?cal.color:P.accent,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>{ev.title}</div><div style={{fontSize:11,color:P.ink3}}>{ev.date}{ev.startTime?" · "+fmtT(ev.startTime):""}</div></div></div>;})}
    </>}
    {tkRes.length>0&&<><div style={{fontSize:10,fontWeight:700,color:P.ink3,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6,marginTop:10,fontFamily:"'DM Sans',sans-serif"}}>Tasks</div>{tkRes.map(t=><div key={t.id} style={{padding:"8px 9px",display:"flex",gap:9,alignItems:"center",cursor:"pointer",borderRadius:8,transition:"background 0.1s"}} onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Check checked={t.done} onChange={()=>{}} color={t.urgent?P.accent:P.navy} P={P}/><div style={{flex:1}}><div style={{fontSize:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>{t.dueDate&&<div style={{fontSize:11,color:P.ink3}}>Due {t.dueDate}</div>}</div>{t.urgent&&<Pill color={P.accent} bg={P.al} style={{fontSize:10}}>urgent</Pill>}</div>)}</>}
    {q.length<=1&&<div style={{textAlign:"center",color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif",padding:"16px 0"}}>Start typing…</div>}
  </Overlay>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const winW=useWinW(); const mobile=winW<768;
  const[dark,setDark]=useState(()=>lsGet("dark9",false));
  const[accent,setAccent]=useState(()=>lsGet("accent9","#c13b2e"));
  const P=mkP(dark,accent);
  const[tab,setTab]=useState("month");
  const[year,setYear]=useState(()=>new Date().getFullYear());
  const[month,setMonth]=useState(()=>new Date().getMonth());
  const[events,setEvents]=useState(()=>lsGet("events9",[]));
  const[tasks,setTasks]=useState(()=>lsGet("tasks9",[]).filter(t=>!t.isCourseTask));
  const[slists,setSlists]=useState(()=>lsGet("slists9_data",[]));
  const[cals,setCals]=useState(()=>lsGet("cals9",[]));
  const[wkOff,setWkOff]=useState(0);
  const[hiDate,setHiDate]=useState(null);
  const[evModal,setEvModal]=useState(null);
  const[prefillDate,setPrefillDate]=useState(null);
  const[addTaskModal,setAddTaskModal]=useState(false);
  const[editWkTask,setEditWkTask]=useState(null);
  const[showSearch,setShowSearch]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[tabKey,setTabKey]=useState(0);
  const sbReady=useRef(false);
  const syncT=useRef(null);

  // Load from Supabase in background (non-blocking)
  useEffect(()=>{
    async function load(){
      try{
        const[ev,tk,sl,ca,co,ck,d,ac]=await Promise.all([sbGet("ev9"),sbGet("tk9"),sbGet("sl9"),sbGet("ca9"),sbGet("co9"),sbGet("ck9"),sbGetS("dark9"),sbGetS("accent9")]);
        if(ev&&ev.length)setEvents(ev);
        if(tk&&tk.length)setTasks(tk.filter(t=>!t.isCourseTask));
        if(sl&&sl.length)setSlists(sl);
        if(ca&&ca.length)setCals(ca);
        if(co&&co.length)setCourses(co);
        if(ck&&Object.keys(ck).length)setChecks(ck);
        if(d!==null)setDark(d==="true");
        if(ac)setAccent(ac);
      }catch(e){}
      sbReady.current=true;
    }
    load();
    // Allow saves even if Supabase never responds
    setTimeout(()=>{sbReady.current=true;},6000);
  },[]);

  function sched(k,data){clearTimeout(syncT.current);syncT.current=setTimeout(async()=>{setSyncing(true);await sbSet(k,data);setSyncing(false);},1500);}
  useEffect(()=>{lsSet("events9",events);if(sbReady.current)sched("ev9",events);},[events]);
  useEffect(()=>{lsSet("tasks9",tasks);if(sbReady.current)sched("tk9",tasks);},[tasks]);
  useEffect(()=>{lsSet("slists9_data",slists);if(sbReady.current)sched("sl9",slists);},[slists]);
  useEffect(()=>{lsSet("cals9",cals);if(sbReady.current)sched("ca9",cals);},[cals]);
  useEffect(()=>{lsSet("dark9",dark);if(sbReady.current)sbSetS("dark9",String(dark));},[dark]);
  useEffect(()=>{lsSet("accent9",accent);if(sbReady.current)sbSetS("accent9",accent);},[accent]);

  // Keyboard shortcuts
  useEffect(()=>{
    function h(e){
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key==="n"||e.key==="N"){if(tab==="tasks")setAddTaskModal(true);else{setEvModal(null);setPrefillDate(null);setEvModal("new");}}
      if(e.key==="/"||((e.metaKey||e.ctrlKey)&&e.key==="k")){e.preventDefault();setShowSearch(true);}
      if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);}
    }
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[tab]);

  function switchTab(t){setTab(t);setTabKey(k=>k+1);}
  function doReset(){["events9","tasks9","slists9_data","cals9","checks9","cnotes9","courses9","tlists9"].forEach(k=>localStorage.removeItem(k));setEvents([]);setTasks([]);setSlists([]);setCals([]);setCourses([]);setChecks({});setShowSettings(false);}

  function getWkStart(off){const n=new Date();const s=new Date(n);s.setDate(n.getDate()-n.getDay()+off*7);s.setHours(0,0,0,0);return s;}
  const wkStart=getWkStart(wkOff);

  function handleDayClick(ds){
    const cl=new Date(ds+"T00:00:00"),now=new Date();now.setHours(0,0,0,0);
    const tSun=new Date(now);tSun.setDate(now.getDate()-now.getDay());tSun.setHours(0,0,0,0);
    const cSun=new Date(cl);cSun.setDate(cl.getDate()-cl.getDay());cSun.setHours(0,0,0,0);
    setWkOff(Math.round((cSun-tSun)/(7*86400000)));setHiDate(ds);switchTab("week");
  }
  function saveEvent(f){setEvents(p=>{const e=p.find(x=>x.id===f.id);return e?p.map(x=>x.id===f.id?f:x):[...p,f];});setEvModal(null);setPrefillDate(null);}
  function delEvent(id){setEvents(p=>p.filter(e=>e.id!==id));setEvModal(null);}
  function wkLabel2(){const ws=wkStart,we=new Date(ws);we.setDate(ws.getDate()+6);const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return ws.getDate()+" "+mo[ws.getMonth()]+" – "+we.getDate()+" "+mo[we.getMonth()]+", "+ws.getFullYear();}
  function defLists(){return lsGet("tlists9",[{id:"list1",name:"Uni"},{id:"list2",name:"Life"}]);}

  // Course state lifted to App so courseTasks updates reactively
  const[courses,setCourses]=useState(()=>lsGet("courses9",[]));
  const[checks,setChecks]=useState(()=>lsGet("checks9",{}));
  useEffect(()=>{lsSet("courses9",courses);if(sbReady.current)sched("co9",courses);},[courses]);
  useEffect(()=>{lsSet("checks9",checks);if(sbReady.current)sched("ck9",checks);},[checks]);

  // Course tasks computed live — shown in week panel AND tasks tab
  const courseTasks=(()=>{
    const result=[];
    for(let w=1;w<=TW;w++){
      courses.forEach(c=>{
        c.columns.forEach(col=>{
          if(!checks[w+"|"+c.id+"|"+col]){
            result.push({id:"ct-"+w+"-"+c.id+"-"+col.replace(/\s/g,"_"),title:c.code+": "+col,notes:"Week "+w+" · "+wkLabel(w),dueDate:wkDueStr(w),cc:c.color,urgent:w<=CW});
          }
        });
      });
    }
    return result;
  })();

  const urgentCount=tasks.filter(t=>!t.done&&(t.urgent||(t.dueDate&&daysUntil(t.dueDate)<0))).length;

  const TABS=[
    {id:"month",label:"Month",Icon:({c,s})=><I.Month c={c} s={s}/>},
    {id:"week",label:"Week",Icon:({c,s})=><I.Week c={c} s={s}/>},
    {id:"tasks",label:"Tasks",Icon:({c,s})=><I.Tasks c={c} s={s}/>,badge:urgentCount||null},
    {id:"lists",label:"Lists",Icon:({c,s})=><I.Lists c={c} s={s}/>},
    {id:"courses",label:"Courses",Icon:({c,s})=><I.Courses c={c} s={s}/>},
  ];

  const navBtnStyle=(active)=>({width:"100%",display:"flex",alignItems:"center",gap:10,background:active?P.al:"transparent",color:active?P.accent:P.ink2,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active?700:400,transition:"all 0.15s",marginBottom:2,textAlign:"left"});

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:P.bg,color:P.ink,transition:"background 0.3s",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
    <style>{"select option{background:"+P.bg+";color:"+P.ink+";}"}</style>

    {/* Desktop */}
    {!mobile&&<div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:216,background:P.card,borderRight:"1px solid "+P.border,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"18px 14px 12px",display:"flex",alignItems:"center",gap:9,borderBottom:"1px solid "+P.border}}>
          <I.Star s={26}/><span style={{fontSize:15,fontWeight:800,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:"-0.02em"}}>Planner</span>
        </div>
        <div style={{padding:"10px 8px",flex:1,overflowY:"auto"}}>
          <div style={{fontSize:10,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",padding:"0 6px",marginBottom:5,fontFamily:"'DM Sans',sans-serif"}}>Navigation</div>
          {TABS.map(t=><button key={t.id} onClick={()=>switchTab(t.id)}
            style={navBtnStyle(tab===t.id)}
            onMouseEnter={e=>{if(tab!==t.id){e.currentTarget.style.background=P.bg2;e.currentTarget.style.color=P.ink;}}}
            onMouseLeave={e=>{if(tab!==t.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color=P.ink2;}}}>
            <t.Icon c={tab===t.id?P.accent:P.ink3} s={18}/>
            {t.label}
            {t.badge&&<span style={{marginLeft:"auto",background:P.accent,color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
          </button>)}

          {(tab==="month"||tab==="week")&&<div style={{marginTop:14,borderTop:"1px solid "+P.border,paddingTop:10}}>
            <div style={{fontSize:10,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",padding:"0 6px",marginBottom:6,fontFamily:"'DM Sans',sans-serif"}}>Calendars</div>
            {cals.length===0&&<div style={{fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif",padding:"4px 6px 8px",fontStyle:"italic"}}>No calendars yet</div>}
            {cals.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 6px",borderRadius:8,marginBottom:2,cursor:"pointer",transition:"background 0.12s"}}
              onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div onClick={()=>setCals(p=>p.map(x=>x.id===c.id?{...x,visible:x.visible===false?true:false}:x))} style={{width:9,height:9,borderRadius:"50%",background:c.visible===false?"transparent":c.color,border:"2px solid "+c.color,flexShrink:0,cursor:"pointer",transition:"all 0.15s"}}/>
              <span onClick={()=>setCals(p=>p.map(x=>x.id===c.id?{...x,visible:x.visible===false?true:false}:x))} style={{flex:1,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:c.visible===false?P.ink3:P.ink2,textDecoration:c.visible===false?"line-through":"none"}}>{c.name}</span>
              <input type="color" value={c.color} onChange={e=>setCals(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} style={{width:16,height:16,border:"none",background:"none",cursor:"pointer",padding:0,flexShrink:0}}/>
              <button onClick={()=>setCals(p=>p.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:12,lineHeight:1,padding:"0 2px",opacity:0.5}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.5}>✕</button>
            </div>)}
            <button onClick={()=>{const name=prompt("Calendar name:");if(!name||!name.trim())return;const colors=["#c13b2e","#1c2f5e","#3a7a5a","#7a4a6a","#c9853a","#1a6a7a","#5a4a8a","#c9a84c"];const color=colors[cals.length%colors.length];setCals(p=>[...p,{id:Date.now()+"",name:name.trim(),color,visible:true}]);}}
              style={{width:"100%",marginTop:5,background:"transparent",border:"1.5px dashed "+P.border2,borderRadius:9,padding:"6px 8px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:11,color:P.ink3,transition:"all 0.12s",display:"flex",alignItems:"center",gap:5,justifyContent:"center"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink3;}}>
              <I.Plus s={11} c="currentColor"/>Add calendar
            </button>
          </div>}

          {(tab==="month"||tab==="week")&&<button onClick={()=>{setEvModal("new");setPrefillDate(null);}}
            style={{width:"100%",marginTop:10,background:P.accent,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#fff",fontWeight:600,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
            <I.Plus s={13} c="#fff"/>New Event
          </button>}
        </div>
        <div style={{padding:"8px",borderTop:"1px solid "+P.border,display:"flex",gap:5}}>
          <button onClick={()=>setShowSearch(true)} style={{flex:1,background:P.bg2,border:"1px solid "+P.border,borderRadius:8,padding:"6px 8px",cursor:"pointer",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:5,justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border;e.currentTarget.style.color=P.ink3;}}>
            <I.Search s={13} c="currentColor"/>Search
          </button>
          <button onClick={()=>setShowSettings(true)} style={{background:P.bg2,border:"1px solid "+P.border,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:P.ink3,transition:"all 0.15s",display:"flex",alignItems:"center"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border;e.currentTarget.style.color=P.ink3;}}>
            <I.Gear s={16} c="currentColor"/>
          </button>
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{background:P.card,borderBottom:"1px solid "+P.border,padding:"9px 20px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{fontSize:17,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",flex:1}}>{TABS.find(t=>t.id===tab)?.label}</div>
          {tab==="month"&&<><button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:"1.5px solid "+P.border2,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
            <div style={{fontSize:15,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:160,textAlign:"center"}}>{MONTHS[month]} {year}</div>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:"1.5px solid "+P.border2,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
            <Btn onClick={()=>{setMonth(new Date().getMonth());setYear(new Date().getFullYear());}} v="ghost" small P={P}>Today</Btn></>}
          {tab==="week"&&<><button onClick={()=>setWkOff(w=>w-1)} style={{background:"none",border:"1.5px solid "+P.border2,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
            <div style={{fontSize:14,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:220,textAlign:"center"}}>{wkLabel2()}</div>
            <button onClick={()=>setWkOff(w=>w+1)} style={{background:"none",border:"1.5px solid "+P.border2,borderRadius:9,width:30,height:30,cursor:"pointer",fontSize:14,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
            <Btn onClick={()=>{setWkOff(0);setHiDate(null);}} v="ghost" small P={P}>This Week</Btn></>}
          <span style={{fontSize:10,color:P.ink3,fontFamily:"'DM Sans',sans-serif",marginLeft:4}}><kbd style={{background:P.bg2,border:"1px solid "+P.border,borderRadius:4,padding:"1px 5px",fontSize:10}}>N</kbd> add · <kbd style={{background:P.bg2,border:"1px solid "+P.border,borderRadius:4,padding:"1px 5px",fontSize:10}}>/</kbd> search</span>
        </div>
        <div style={{flex:1,overflow:"auto",padding:"20px"}}>
          {tab==="month"&&<MonthView key={tabKey} year={year} month={month} events={events} tasks={tasks} cals={cals} onDayClick={handleDayClick} onEvClick={ev=>{setEvModal(ev);}} onAddEv={ds=>{setPrefillDate(ds);setEvModal("new");}} P={P} mobile={false}/>}
          {tab==="week"&&<WeekView key={tabKey} wkStart={wkStart} events={events} tasks={tasks} cals={cals} hiDate={hiDate} onEvClick={ev=>setEvModal(ev)} onAddEv={ds=>{setPrefillDate(ds);setEvModal("new");}} onTaskToggle={id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))} onTaskEdit={t=>setEditWkTask(t)} onAddTask={()=>setAddTaskModal(true)} P={P} mobile={false} courseTasks={courseTasks}/>}
          {tab==="tasks"&&<TasksView key={tabKey} tasks={tasks} setTasks={setTasks} P={P} mobile={false} courseTasks={courseTasks}/>}
          {tab==="lists"&&<ListsView key={tabKey} lists={slists} setLists={setSlists} P={P} mobile={false}/>}
          {tab==="courses"&&<CoursesView key={tabKey} P={P} mobile={false} courses={courses} setCourses={setCourses} checks={checks} setChecks={setChecks}/>}
        </div>
      </div>
    </div>}

    {/* Mobile */}
    {mobile&&<div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      <div style={{background:P.card,borderBottom:"1px solid "+P.border,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><I.Star s={22}/><span style={{fontSize:14,fontWeight:800,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Planner</span></div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          {tab==="month"&&<><button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:"1px solid "+P.border2,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <span style={{fontSize:13,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{MONTHS[month].slice(0,3)} {year}</span>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:"1px solid "+P.border2,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button></>}
          {tab==="week"&&<><button onClick={()=>setWkOff(w=>w-1)} style={{background:"none",border:"1px solid "+P.border2,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <span style={{fontSize:11,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{wkLabel2()}</span>
            <button onClick={()=>setWkOff(w=>w+1)} style={{background:"none",border:"1px solid "+P.border2,borderRadius:7,width:28,height:28,cursor:"pointer",fontSize:13,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button></>}
          {(tab==="month"||tab==="week")&&<Btn onClick={()=>{setEvModal("new");setPrefillDate(null);}} P={P} small style={{padding:"5px 11px",fontSize:11}}>+ Event</Btn>}
          <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,display:"flex",alignItems:"center"}}><I.Search s={17} c={P.ink3}/></button>
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,display:"flex",alignItems:"center"}}><I.Gear s={16} c={P.ink3}/></button>
        </div>
      </div>
      <div style={{flex:1,overflow:"auto",padding:"14px 14px 78px"}}>
        {tab==="month"&&<MonthView key={tabKey} year={year} month={month} events={events} tasks={tasks} cals={cals} onDayClick={handleDayClick} onEvClick={ev=>setEvModal(ev)} onAddEv={ds=>{setPrefillDate(ds);setEvModal("new");}} P={P} mobile={true}/>}
        {tab==="week"&&<WeekView key={tabKey} wkStart={wkStart} events={events} tasks={tasks} cals={cals} hiDate={hiDate} onEvClick={ev=>setEvModal(ev)} onAddEv={ds=>{setPrefillDate(ds);setEvModal("new");}} onTaskToggle={id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))} onTaskEdit={t=>setEditWkTask(t)} onAddTask={()=>setAddTaskModal(true)} P={P} mobile={true} courseTasks={courseTasks}/>}
        {tab==="tasks"&&<TasksView key={tabKey} tasks={tasks} setTasks={setTasks} P={P} mobile={true} courseTasks={courseTasks}/>}
        {tab==="lists"&&<ListsView key={tabKey} lists={slists} setLists={setSlists} P={P} mobile={true}/>}
        {tab==="courses"&&<CoursesView key={tabKey} P={P} mobile={true} courses={courses} setCourses={setCourses} checks={checks} setChecks={setChecks}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:P.card,borderTop:"1px solid "+P.border,display:"flex",zIndex:100,boxShadow:"0 -4px 20px "+P.sh,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>switchTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"9px 4px 7px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",transition:"all 0.15s"}}>
          <t.Icon c={tab===t.id?P.accent:P.ink3} s={21}/>
          <span style={{fontSize:9,fontWeight:tab===t.id?700:400,color:tab===t.id?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{t.label}</span>
          {tab===t.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:18,height:2,background:P.accent,borderRadius:"0 0 2px 2px"}}/>}
          {t.badge&&<span style={{position:"absolute",top:5,right:"14%",background:P.accent,color:"#fff",borderRadius:"50%",width:13,height:13,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
        </button>)}
      </div>
    </div>}

    {/* Modals */}
    {evModal&&<EventModal ev={evModal==="new"?null:evModal} cals={cals}
      onSave={saveEvent} onDel={delEvent} onClose={()=>{setEvModal(null);setPrefillDate(null);}}
      P={P} mobile={mobile}/>}
    {addTaskModal&&<TaskModal task={null} lists={defLists()} onSave={f=>{setTasks(p=>[...p,f]);setAddTaskModal(false);}} onDel={()=>{}} onClose={()=>setAddTaskModal(false)} P={P} mobile={mobile}/>}
    {editWkTask&&<TaskModal task={editWkTask} lists={defLists()} onSave={f=>{setTasks(p=>p.map(t=>t.id===f.id?f:t));setEditWkTask(null);}} onDel={id=>{setTasks(p=>p.filter(t=>t.id!==id));setEditWkTask(null);}} onClose={()=>setEditWkTask(null)} P={P} mobile={mobile}/>}
    {showSearch&&<SearchView events={events} tasks={tasks} cals={cals} onClose={()=>setShowSearch(false)} P={P} mobile={mobile}/>}
    {showSettings&&<SettingsView dark={dark} setDark={setDark} accent={accent} setAccent={setAccent} onReset={doReset} onClose={()=>setShowSettings(false)} P={P} mobile={mobile}/>}
    <Sync on={syncing} P={P}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
