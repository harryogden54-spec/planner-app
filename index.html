async function sbUpsert(id, data) {
  try {
    await fetch(`${SB_URL}/rest/v1/planner_data`, {
      method:"POST", headers:SBH,
      body: JSON.stringify({ id, data, updated_at: new Date().toISOString() })

  } catch(e) { console.warn("Supabase write failed", e); }

async function sbGet(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/planner_data?id=eq.${id}&select=data`, { headers:SBH });
    if (!r.ok) return null;
    const rows = await r.json();
    return rows.length ? rows[0].data : null;
  } catch(e) { console.warn("Supabase read failed", e); return null; }
}

async function sbGetSetting(key) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/settings?key=eq.${key}&select=value`, { headers:SBH });

    const rows = await r.json();

  } catch(e) { return null; }

function p2(n){return String(n).padStart(2,"0");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmtT(t){if(!t)return"";const[h,m]=t.split(":").map(Number);const ap=h>=12?"pm":"am";const hh=h%12||12;return m===0?`${hh}${ap}`:`${hh}.${p2(m)}${ap}`;}
function pT(t){if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fdm(y,m){return new Date(y,m,1).getDay();}
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function dateAdd(n){const d=new Date();d.setDate(d.getDate()+n);return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function wdayDate(n){const d=new Date();const diff=(d.getDay()+6)%7;d.setDate(d.getDate()-diff+(n-1));return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function daysUntil(ds){if(!ds)return null;return Math.ceil((new Date(ds+"T00:00:00")-new Date(todayStr()+"T00:00:00"))/(86400000));}
function fmtCountdown(ds){const d=daysUntil(ds);if(d===null)return null;if(d<0)return{label:`${Math.abs(d)}d overdue`,color:"#c13b2e"};if(d===0)return{label:"due today",color:"#c13b2e"};if(d===1)return{label:"due tomorrow",color:"#e08030"};if(d<=7)return{label:`in ${d}d`,color:"#8a7050"};return null;}

// ─── useWindowSize hook ───────────────────────────────────────────────────────
function useWindowSize(){
  const[size,setSize]=useState({w:window.innerWidth,h:window.innerHeight});
  useEffect(()=>{const h=()=>setSize({w:window.innerWidth,h:window.innerHeight});window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return size;
}

// ─── Shared UI ────────────────────────────────────────────────────────────────
const R=14;

function Card({children,style,onClick,P,noHover}){
  const[hov,setHov]=useState(false);
  return(<div onClick={onClick} onMouseEnter={()=>!noHover&&setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{background:P.white,borderRadius:R,padding:16,border:`1px solid ${P.border}`,
      boxShadow:hov&&onClick?`0 8px 28px ${P.shadow2}`:`0 2px 8px ${P.shadow}`,
      transition:"box-shadow 0.2s,transform 0.2s",transform:hov&&onClick?"translateY(-2px)":"none",
      cursor:onClick?"pointer":"default",...style}}>{children}</div>);
}

function Pill({children,color,bg,style}){
  return(<span style={{display:"inline-flex",alignItems:"center",gap:4,background:bg||color+"22",color,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,...style}}>{children}</span>);
}

function Btn({children,onClick,variant="primary",style,small,P,disabled}){
  const[hov,setHov]=useState(false);
  const sz=small?{fontSize:12,padding:"6px 14px"}:{fontSize:13,padding:"9px 20px"};
  const vs={
    primary:{background:disabled?"#ccc":P.accent,color:"#fff",boxShadow:hov&&!disabled?`0 4px 14px ${P.accent}55`:"none",border:"none"},
    ghost:{background:hov?P.bg2:"transparent",color:P.ink2,border:`1px solid ${P.border2}`},
    danger:{background:hov?P.accentLight:"transparent",color:P.accent,border:`1px solid ${P.accentMid}`},
    navy:{background:P.navy,color:"#fff",border:"none"},
  };
  return(<button onClick={disabled?undefined:onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    disabled={disabled}
    style={{display:"inline-flex",alignItems:"center",gap:6,borderRadius:10,cursor:disabled?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,transition:"all 0.15s",...sz,...vs[variant],...style}}>{children}</button>);
}

function Inp({value,onChange,placeholder,type="text",style,multiline,rows=3,onKeyDown,P,autoFocus}){
  const s={width:"100%",padding:"9px 13px",border:`1px solid ${P.border2}`,borderRadius:10,fontSize:13,background:P.bg,color:P.ink,outline:"none",lineHeight:1.5,fontFamily:"'DM Sans',sans-serif",transition:"border-color 0.15s",...style};
  const fx=e=>e.target.style.borderColor=P.accent; const bl=e=>e.target.style.borderColor=P.border2;
  if(multiline)return<textarea autoFocus={autoFocus} value={value} onChange={onChange} placeholder={placeholder} rows={rows} onKeyDown={onKeyDown} style={{...s,resize:"vertical"}} onFocus={fx} onBlur={bl}/>;
  return<input autoFocus={autoFocus} type={type} value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown} style={s} onFocus={fx} onBlur={bl}/>;
}

function Lbl({children,P}){

// ─── Month View ───────────────────────────────────────────────────────────────
function MonthView({year,month,events,tasks,calendars,onDayClick,onEventClick,onAddEvent,P,mobile}){
  const total=dim(year,month),first=fdm(year,month),today=todayStr();
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(d);
  function ds(d){return`${year}-${p2(month+1)}-${p2(d)}`;}
  function getItems(d){
    const s=ds(d);
    const evs=events.filter(e=>{if(e.date===s)return true;if(e.isMultiDay&&e.multiDayEnd)return s>=e.date&&s<=e.multiDayEnd;return false;}).sort((a,b)=>pT(a.startTime)-pT(b.startTime));
    const tks=tasks.filter(t=>t.dueDate===s&&!t.done);
    return{evs,tks};
  }
  const minH=mobile?80:108;
  return(
    <div style={{animation:"slideUp 0.3s ease both"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
        {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:mobile?9:11,fontWeight:600,color:P.ink3,padding:"4px 0",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>{mobile?d[0]:d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:mobile?2:4}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={`e${i}`} style={{minHeight:minH}}/>;
          const s=ds(d),isToday=s===today;
          const{evs,tks}=getItems(d);
          return(
            <div key={i} onClick={()=>onDayClick(s)}
              style={{minHeight:minH,background:isToday?P.accentLight:P.white,borderRadius:mobile?10:R,border:`1.5px solid ${isToday?P.accent:P.border}`,padding:mobile?"5px 3px 3px":"8px 6px 6px",cursor:"pointer",position:"relative",transition:"all 0.18s",animation:`slideUp 0.3s ease ${Math.min(i,20)*5}ms both`}}
              onMouseEnter={e=>{if(!isToday&&!mobile){e.currentTarget.style.boxShadow=`0 6px 20px ${P.shadow2}`;e.currentTarget.style.transform="translateY(-2px)";}}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
              <div style={{fontSize:mobile?10:12,fontWeight:isToday?700:400,color:isToday?P.accent:P.ink3,textAlign:"right",marginBottom:3,fontFamily:"'DM Sans',sans-serif"}}>{d}</div>
              {!mobile&&evs.slice(0,3).map(ev=>{
                const cal=calendars.find(c=>c.id===ev.calendarId),color=cal?.color||P.accent;
                const isMid=ev.isMultiDay&&ev.multiDayEnd&&s>ev.date&&s<ev.multiDayEnd;
                const tStr=ev.startTime&&ev.endTime?`${fmtT(ev.startTime)}–${fmtT(ev.endTime)}`:ev.startTime?fmtT(ev.startTime):"";
                return(<div key={ev.id} onClick={e=>{e.stopPropagation();onEventClick(ev);}}
                  style={{fontSize:10,lineHeight:1.35,marginBottom:3,padding:"2px 5px",borderRadius:6,background:ev.showColorFill&&isMid?color+"20":color+"15",color:ev.done?P.ink3:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500,textDecoration:ev.done?"line-through":"none",transition:"background 0.1s",opacity:ev.done?0.5:1}}
                  onMouseEnter={e=>e.currentTarget.style.background=color+"30"} onMouseLeave={e=>e.currentTarget.style.background=color+"15"}>
                  <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:color,marginRight:3,verticalAlign:"middle"}}/>
                  {tStr&&<span style={{color:P.ink3,marginRight:2,fontSize:9}}>{tStr} </span>}
                  {ev.title}
                </div>);
              })}
              {mobile&&evs.length>0&&<div style={{display:"flex",gap:2,flexWrap:"wrap",marginTop:2}}>
                {evs.slice(0,2).map(ev=>{const cal=calendars.find(c=>c.id===ev.calendarId),color=cal?.color||P.accent;return<div key={ev.id} style={{width:6,height:6,borderRadius:"50%",background:color}}/>;})}</div>}
              {!mobile&&tks.slice(0,1).map(t=>(
                <div key={t.id} style={{fontSize:10,lineHeight:1.35,marginBottom:2,padding:"2px 5px",borderRadius:6,background:P.bg2,color:t.urgent?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>◦ {t.title}</div>
              ))}
              {!mobile&&(evs.length+tks.length)>4&&<div style={{fontSize:9,color:P.ink3,textAlign:"right"}}>+{evs.length+tks.length-4}</div>}
              {!mobile&&<button onClick={e=>{e.stopPropagation();onAddEvent(s);}} className="day-add"
                style={{position:"absolute",bottom:4,right:5,background:P.accentLight,border:`1px solid ${P.accentMid}`,borderRadius:6,cursor:"pointer",fontSize:13,color:P.accent,padding:"1px 6px",lineHeight:1.4,opacity:0,transition:"opacity 0.15s",fontWeight:700}}>+</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Week View ────────────────────────────────────────────────────────────────

  const days=[];

  const today=todayStr();
  const weekTasks=tasks.filter(t=>days.some(d=>d.ds===t.dueDate)&&!t.done);
  const wk=weekStart.toISOString().slice(0,10);
  const[notes,setNotes]=useState(()=>lsGet(`wnotes-${wk}`,""));
  useEffect(()=>{lsSave(`wnotes-${wk}`,notes);},[notes,wk]);
  function getEvs(s){return events.filter(e=>{if(e.date===s)return true;if(e.isMultiDay&&e.multiDayEnd)return s>=e.date&&s<=e.multiDayEnd;return false;}).sort((a,b)=>pT(a.startTime)-pT(b.startTime));}
  const todayEvs=getEvs(today);

            {todayEvs.map(ev=>{const cal=calendars.find(c=>c.id===ev.calendarId),color=cal?.color||P.accent;const tStr=ev.startTime&&ev.endTime?`${fmtT(ev.startTime)}–${fmtT(ev.endTime)}`:ev.startTime?fmtT(ev.startTime):"";return(
              <div key={ev.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>

                {tStr&&<span style={{fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{tStr}</span>}
              </div>
            );})}
          </div>
        )}
        {days.map((day,di)=>{
          const isToday=day.ds===today,isHL=day.ds===highlightDate;
          const evs=getEvs(day.ds);

              <div style={{width:mobile?68:78,flexShrink:0,padding:mobile?"10px 8px":"13px 10px",background:isHL?P.accentLight:isToday?P.navyLight:P.bg2,borderRight:`1px solid ${P.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
                <div style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:isHL?P.accent:isToday?P.navy:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{day.short}</div>
                <div style={{fontSize:mobile?24:27,fontWeight:300,lineHeight:1,color:isHL?P.accent:isToday?P.navy:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{day.date}</div>
                <div style={{fontSize:9,color:isHL?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{MONTHS[day.month].slice(0,3)}</div>
              </div>
              <div style={{flex:1,padding:mobile?"8px 10px":"10px 13px",display:"flex",flexDirection:"column",gap:3,minHeight:mobile?60:68}}>
                {evs.length===0&&<div style={{fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif",opacity:0.35,alignSelf:"center",marginTop:6}}>—</div>}
                {evs.map(ev=>{

                  const tStr=ev.startTime&&ev.endTime?`${fmtT(ev.startTime)}–${fmtT(ev.endTime)}`:ev.startTime?fmtT(ev.startTime):"";

            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>

              <div style={{flex:1}}>

                <div style={{display:"flex",gap:7,alignItems:"center",marginTop:t.dueDate?3:0}}>
                  {(t.dueDate||t.dueTime)&&<div style={{fontSize:11,color:P.accent,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>Due: {t.dueDate}{t.dueTime?` ${fmtT(t.dueTime)}`:""}</div>}
                  {cd&&<Pill color={cd.color} style={{fontSize:10}}>{cd.label}</Pill>}
                </div>

            </div>
          </Card>

}

// ─── Simple Lists ─────────────────────────────────────────────────────────────
function SimpleListsView({simpleLists,setSimpleLists,P,mobile}){
  const[active,setActive]=useState(()=>simpleLists[0]?.id||null);
  const[newItemText,setNewItemText]=useState("");
  const[newListName,setNewListName]=useState("");const[addingList,setAddingList]=useState(false);
  const activeList=simpleLists.find(l=>l.id===active);

  function addItem(){if(!newItemText.trim()||!active)return;setSimpleLists(p=>p.map(l=>l.id===active?{...l,items:[...l.items,{id:Date.now().toString(),text:newItemText.trim(),done:false}]}:l));setNewItemText("");}
  function toggleItem(lid,iid){setSimpleLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.map(it=>it.id===iid?{...it,done:!it.done}:it)}:l));}
  function delItem(lid,iid){setSimpleLists(p=>p.map(l=>l.id===lid?{...l,items:l.items.filter(it=>it.id!==iid)}:l));}
  function addList(){if(!newListName.trim())return;const nl={id:Date.now().toString(),name:newListName.trim(),items:[]};setSimpleLists(p=>[...p,nl]);setActive(nl.id);setNewListName("");setAddingList(false);}
  function delList(id){setSimpleLists(p=>p.filter(l=>l.id!==id));if(active===id)setActive(simpleLists.find(l=>l.id!==id)?.id||null);}

  const done=activeList?.items.filter(i=>i.done).length||0;
  const total=activeList?.items.length||0;
  const pct=total?Math.round(done/total*100):0;

  return(
    <div style={{display:mobile?"block":"grid",gridTemplateColumns:"200px 1fr",gap:22,animation:"slideUp 0.3s ease both"}}>
      <div style={{marginBottom:mobile?16:0}}>
        {mobile?(
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {simpleLists.map(l=>(
              <button key={l.id} onClick={()=>setActive(l.id)} style={{flexShrink:0,background:active===l.id?P.accent:"transparent",color:active===l.id?"#fff":P.ink2,border:`1.5px solid ${active===l.id?P.accent:P.border2}`,borderRadius:20,padding:"6px 16px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,transition:"all 0.15s",whiteSpace:"nowrap"}}>{l.name}</button>
            ))}
            <button onClick={()=>setAddingList(true)} style={{flexShrink:0,background:"transparent",border:`1.5px dashed ${P.border2}`,borderRadius:20,padding:"6px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3}}>+ list</button>
          </div>
        ):(
          <>
            <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>My Lists</div>
            {simpleLists.map((l,i)=>(
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,animation:`slideUp 0.25s ease ${i*25}ms both`}}>
                <button onClick={()=>setActive(l.id)} style={{flex:1,textAlign:"left",background:active===l.id?P.accentLight:"transparent",color:active===l.id?P.accent:P.ink2,border:`1.5px solid ${active===l.id?P.accentMid:"transparent"}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:active===l.id?600:400,transition:"all 0.15s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{l.name}</span>
                  {l.items.length>0&&<span style={{fontSize:10,color:active===l.id?P.accent:P.ink3}}>{Math.round(l.items.filter(x=>x.done).length/l.items.length*100)}%</span>}
                </button>
                <button onClick={()=>delList(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13,transition:"color 0.12s"}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
              </div>
            ))}
            {addingList?<div style={{display:"flex",gap:5,marginTop:5}}><Inp autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name..." style={{flex:1,fontSize:12}} P={P}/><Btn onClick={addList} small P={P}>+</Btn></div>
            :<button onClick={()=>setAddingList(true)} style={{width:"100%",marginTop:5,background:"transparent",border:`1.5px dashed ${P.border2}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,color:P.ink3,transition:"all 0.12s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink3;}}>+ new list</button>}
          </>
        )}
        {addingList&&mobile&&<div style={{display:"flex",gap:6,marginTop:8}}><Inp autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addList()} placeholder="List name..." style={{flex:1,fontSize:12}} P={P}/><Btn onClick={addList} small P={P}>+</Btn><button onClick={()=>setAddingList(false)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:16}}>✕</button></div>}
      </div>
      <div>
        {!activeList&&<Card P={P} noHover style={{textAlign:"center",padding:40,color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif",fontStyle:"italic"}}>Create a list to get started.</Card>}
        {activeList&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:mobile?18:22,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{activeList.name}</div>
            {total>0&&<div style={{fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{done}/{total} done</div>}
          </div>
          {total>0&&<ProgBar pct={pct} color={P.accent} P={P} style={{marginBottom:16}}/>}
          {activeList.items.map((it,i)=>(
            <Card key={it.id} P={P} noHover style={{marginBottom:6,padding:"11px 14px",borderLeft:`3px solid ${it.done?P.border:P.navy}`,opacity:it.done?0.55:1,animation:`slideUp 0.2s ease ${i*20}ms both`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Check checked={it.done} onChange={()=>toggleItem(activeList.id,it.id)} color={P.navy} P={P}/>
                <span style={{flex:1,fontSize:mobile?13:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",textDecoration:it.done?"line-through":"none",fontWeight:500}}>{it.text}</span>
                <button onClick={()=>delItem(activeList.id,it.id)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:13,transition:"color 0.12s",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>
              </div>
            </Card>
          ))}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <Inp value={newItemText} onChange={e=>setNewItemText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder={`Add to ${activeList.name}...`} P={P}/>
            <Btn onClick={addItem} P={P} small={mobile}>Add</Btn>
          </div>
        </>)}
      </div>
    </div>
  );
}

// ─── Course Tracker ───────────────────────────────────────────────────────────
function CourseTracker({P,mobile}){
  const[courses,setCourses]=useState(()=>lsGet("courses7",DEF_COURSES));
  const[checks,setChecks]=useState(()=>lsGet("courseChecks7",{}));
  const[cNotes,setCNotes]=useState(()=>lsGet("courseNotes7",{}));
  const[view,setView]=useState("course");
  const[activeWk,setActiveWk]=useState(CW);
  const[activeCourse,setActiveCourse]=useState(DEF_COURSES[0].id);
  const[addingCourse,setAddingCourse]=useState(false);
  const[newCourse,setNewCourse]=useState({code:"",name:"",color:P.accent,columns:["Watched Lecture","Done Readings"]});
  const[editCourse,setEditCourse]=useState(null);
  const[addingColFor,setAddingColFor]=useState(null);
  const[newColText,setNewColText]=useState("");
  const CCOLS=[P.accent,P.navy,"#3a7a5a","#7a4a6a","#7a6a1a","#1a6a7a","#c9a84c","#7a3a1a"];
  useEffect(()=>{lsSave("courses7",courses);},[courses]);
  useEffect(()=>{lsSave("courseChecks7",checks);},[checks]);
  useEffect(()=>{lsSave("courseNotes7",cNotes);},[cNotes]);
  function tog(wk,cid,col){const k=`${wk}|${cid}|${col}`;setChecks(p=>({...p,[k]:!p[k]}));}
  function getN(wk,cid){return cNotes[`${wk}|${cid}`]||"";}
  function setN(wk,cid,v){setCNotes(p=>({...p,[`${wk}|${cid}`]:v}));}
  function addCol(cid){if(!newColText.trim())return;setCourses(p=>p.map(c=>c.id===cid?{...c,columns:[...c.columns,newColText.trim()]}:c));setNewColText("");setAddingColFor(null);}
  function remCol(cid,col){setCourses(p=>p.map(c=>c.id===cid?{...c,columns:c.columns.filter(x=>x!==col)}:c));}
  function saveCourse(){if(editCourse){setCourses(p=>p.map(c=>c.id===editCourse.id?editCourse:c));setEditCourse(null);}else if(newCourse.code.trim()){setCourses(p=>[...p,{...newCourse,id:Date.now().toString()}]);setNewCourse({code:"",name:"",color:P.accent,columns:["Watched Lecture","Done Readings"]});setAddingCourse(false);}}
  const weeks=Array.from({length:TW},(_,i)=>i+1);
  const acd=courses.find(c=>c.id===activeCourse)||courses[0];
  function cPct(c){let t=0,d=0;weeks.forEach(w=>{c.columns.forEach(col=>{t++;if(checks[`${w}|${c.id}|${col}`])d++;});});return t?Math.round(d/t*100):0;}
  function wPct(wk){let t=0,d=0;courses.forEach(c=>{c.columns.forEach(col=>{t++;if(checks[`${wk}|${c.id}|${col}`])d++;});});return t?Math.round(d/t*100):0;}
  const OV2=mkOV(); const MB2=mkMB(P,mobile);

  return(
    <div style={{animation:"slideUp 0.3s ease both"}}>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {["week","course"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?P.accent:"transparent",color:view===v?"#fff":P.ink2,border:`1.5px solid ${view===v?P.accent:P.border2}`,borderRadius:20,padding:mobile?"5px 14px":"6px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:mobile?12:13,fontWeight:600,transition:"all 0.15s"}}>
            {v==="week"?"By Week":"By Course"}
          </button>
        ))}
      </div>

      {view==="week"&&(
        <div style={{display:mobile?"block":"grid",gridTemplateColumns:"170px 1fr",gap:18}}>
          <div style={{marginBottom:mobile?12:0}}>
            {mobile?(
              <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4}}>
                {weeks.map(w=><button key={w} onClick={()=>setActiveWk(w)} style={{flexShrink:0,background:w===activeWk?P.accent:w===CW?P.accentLight:"transparent",color:w===activeWk?"#fff":w===CW?P.accent:P.ink3,border:`1.5px solid ${w===activeWk?P.accent:w===CW?P.accentMid:P.border}`,borderRadius:20,padding:"5px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:w===CW?600:400}}>W{w}{w===CW?<span style={{fontSize:9,marginLeft:2}}>←</span>:null}</button>)}
              </div>
            ):(
              <>
                <div style={{fontSize:11,fontWeight:600,color:P.ink3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Sans',sans-serif"}}>Term Weeks</div>
                {weeks.map(w=>{const isCur=w===CW,isSel=w===activeWk,pct=wPct(w);return(
                  <button key={w} onClick={()=>setActiveWk(w)} style={{width:"100%",textAlign:"left",background:isSel?P.accentLight:"transparent",color:isSel?P.accent:isCur?P.accent:P.ink2,border:`1.5px solid ${isSel?P.accentMid:isCur?P.accentMid+"66":"transparent"}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:isSel?700:isCur?600:400,transition:"all 0.15s",marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>Week {w}{isCur?<span style={{fontSize:9,marginLeft:4,opacity:0.7}}>← now</span>:null}</span>
                    <span style={{fontSize:10,color:isSel?P.accent:P.ink3}}>{pct}%</span>
                  </button>
                );})}
              </>
            )}
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{fontSize:mobile?18:20,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Week {activeWk}</div>

            </div>
            <ProgBar pct={wPct(activeWk)} color={P.accent} P={P} style={{marginBottom:4}}/>
            <div style={{fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif",marginBottom:14}}>{wPct(activeWk)}% this week</div>

                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>

            <div style={{display:"flex",justifyContent:"space-between",marginTop:18,paddingBottom:mobile?12:0}}>
              {editCourse?<Btn onClick={()=>{setCourses(p=>p.filter(c=>c.id!==editCourse.id));setEditCourse(null);}} variant="danger" P={P}>Delete</Btn>:<span/>}

// ─── Search ───────────────────────────────────────────────────────────────────
function SearchBar({events,tasks,calendars,onClose,P,mobile}){
  const[q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  const lq=q.toLowerCase();
  const evRes=q.length>1?events.filter(e=>(e.title||"").toLowerCase().includes(lq)||(e.notes||"").toLowerCase().includes(lq)):[];
  const tkRes=q.length>1?tasks.filter(t=>(t.title||"").toLowerCase().includes(lq)||(t.notes||"").toLowerCase().includes(lq)):[];
  return(
    <div style={mkOV()} onClick={onClose}>
      <div style={{background:P.white,borderRadius:mobile?"20px 20px 0 0":20,width:"100%",maxWidth:mobile?"100%":560,maxHeight:mobile?"80vh":"70vh",boxShadow:`0 -8px 40px rgba(0,0,0,0.2)`,animation:"slideUp 0.2s ease both",overflow:"hidden",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
        {mobile&&<div style={{width:40,height:4,borderRadius:2,background:P.border2,margin:"12px auto 0"}}/>}
        <div style={{padding:"14px 18px",borderBottom:`1px solid ${P.border}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <span style={{fontSize:16,opacity:0.5}}>🔍</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search events and tasks..." onKeyDown={e=>e.key==="Escape"&&onClose()} style={{flex:1,border:"none",outline:"none",fontSize:15,color:P.ink,background:"transparent",fontFamily:"'DM Sans',sans-serif"}}/>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:18,padding:"4px 8px"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:q.length>1?"8px 0":0}}>
          {q.length>1&&evRes.length===0&&tkRes.length===0&&<div style={{padding:"24px 18px",textAlign:"center",color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>No results for "{q}"</div>}
          {evRes.length>0&&(<>
            <div style={{padding:"8px 18px 3px",fontSize:10,fontWeight:700,color:P.ink3,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Events</div>
            {evRes.map(ev=>{const cal=calendars.find(c=>c.id===ev.calendarId),color=cal?.color||P.accent;return(
              <div key={ev.id} style={{padding:"9px 18px",display:"flex",gap:10,alignItems:"center",transition:"background 0.1s",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>{ev.title}</div><div style={{fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>{ev.date}{ev.startTime?` · ${fmtT(ev.startTime)}`:""}</div></div>
              </div>
            );})}
          </>)}
          {tkRes.length>0&&(<>
            <div style={{padding:"8px 18px 3px",fontSize:10,fontWeight:700,color:P.ink3,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>Tasks</div>
            {tkRes.map(t=>(
              <div key={t.id} style={{padding:"9px 18px",display:"flex",gap:10,alignItems:"center",transition:"background 0.1s",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=P.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <Check checked={t.done} onChange={()=>{}} color={t.urgent?P.accent:P.navy} P={P}/>
                <div style={{flex:1}}><div style={{fontSize:14,color:P.ink,fontFamily:"'DM Sans',sans-serif",fontWeight:500,textDecoration:t.done?"line-through":"none"}}>{t.title}</div>{t.dueDate&&<div style={{fontSize:11,color:P.ink3}}>Due {t.dueDate}</div>}</div>
                {t.urgent&&<Pill color={P.accent} bg={P.accentLight} style={{fontSize:10}}>urgent</Pill>}
              </div>
            ))}
          </>)}
          {q.length<=1&&<div style={{padding:"28px 18px",textAlign:"center",color:P.ink3,fontSize:14,fontFamily:"'DM Sans',sans-serif"}}>Start typing to search…</div>}
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const{w}=useWindowSize(); const mobile=w<768;
  const[dark,setDark]=useState(()=>lsGet("dark7",false));
  const[accent,setAccent]=useState(()=>lsGet("accent7","#c13b2e"));
  const P=makeP(dark,accent);
  const[tab,setTab]=useState("month");
  const[year,setYear]=useState(()=>new Date().getFullYear());
  const[month,setMonth]=useState(()=>new Date().getMonth());
  const[events,setEvents]=useState(()=>lsGet("events7",makeDemoEvents()));
  const[tasks,setTasks]=useState(()=>lsGet("tasks7",makeDemoTasks()));
  const[simpleLists,setSimpleLists]=useState(()=>lsGet("simpleLists7",makeDemoSimpleLists()));
  const[calendars,setCalendars]=useState(()=>lsGet("calendars7",DEF_CALS));
  const[showEventModal,setShowEventModal]=useState(false);
  const[editEvent,setEditEvent]=useState(null);
  const[prefillDate,setPrefillDate]=useState(null);
  const[showCalSidebar,setShowCalSidebar]=useState(false);
  const[weekOffset,setWeekOffset]=useState(0);
  const[highlightDate,setHighlightDate]=useState(null);
  const[showAddTask,setShowAddTask]=useState(false);
  const[editWeekTask,setEditWeekTask]=useState(null);
  const[showSearch,setShowSearch]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[tabKey,setTabKey]=useState(0);
  const[syncing,setSyncing]=useState(false);
  const[loaded,setLoaded]=useState(false);

  // Supabase: load on mount
  useEffect(()=>{
    async function loadAll(){
      const[ev,tk,sl,ca,d,ac]=await Promise.all([
        sbGet("events7"),sbGet("tasks7"),sbGet("simpleLists7"),sbGet("calendars7"),
        sbGetSetting("dark7"),sbGetSetting("accent7"),
      ]);
      if(ev)setEvents(ev); if(tk)setTasks(tk); if(sl)setSimpleLists(sl);
      if(ca)setCalendars(ca); if(d!==null)setDark(d==="true"); if(ac)setAccent(ac);
      setLoaded(true);
    }
    loadAll();
  },[]);

  // Supabase: save on change (debounced)
  const syncT=useRef(null);
  function scheduleSave(key,data){
    clearTimeout(syncT.current);
    syncT.current=setTimeout(async()=>{
      setSyncing(true);
      await sbUpsert(key,data);
      setSyncing(false);
    },1200);
  }

  useEffect(()=>{lsSave("events7",events);if(loaded)scheduleSave("events7",events);},[events]);
  useEffect(()=>{lsSave("tasks7",tasks);if(loaded)scheduleSave("tasks7",tasks);},[tasks]);
  useEffect(()=>{lsSave("simpleLists7",simpleLists);if(loaded)scheduleSave("simpleLists7",simpleLists);},[simpleLists]);
  useEffect(()=>{lsSave("calendars7",calendars);if(loaded)scheduleSave("calendars7",calendars);},[calendars]);
  useEffect(()=>{lsSave("dark7",dark);if(loaded)sbSetSetting("dark7",String(dark));},[dark]);
  useEffect(()=>{lsSave("accent7",accent);if(loaded)sbSetSetting("accent7",accent);},[accent]);

  // Keyboard
  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if(e.key==="n"||e.key==="N"){if(tab==="tasks")setShowAddTask(true);else{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}}
      if((e.key==="/")||(e.key==="k"&&(e.metaKey||e.ctrlKey))){e.preventDefault();setShowSearch(true);}
      if(e.key==="Escape"){setShowSearch(false);setShowSettings(false);}
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[tab]);

  function switchTab(t){setTab(t);setTabKey(k=>k+1);}
  function doReset(){
    ["events7","tasks7","simpleLists7","calendars7","taskLists7","courseChecks7","courseNotes7"].forEach(k=>localStorage.removeItem(k));
    setEvents(makeDemoEvents());setTasks(makeDemoTasks());setSimpleLists(makeDemoSimpleLists());setCalendars(DEF_CALS);setShowSettings(false);
  }
  function getWeekStart(off){const now=new Date();const s=new Date(now);s.setDate(now.getDate()-now.getDay()+off*7);s.setHours(0,0,0,0);return s;}
  const weekStart=getWeekStart(weekOffset);
  function handleDayClick(ds){
    const cl=new Date(ds+"T00:00:00"),now=new Date();now.setHours(0,0,0,0);
    const tSun=new Date(now);tSun.setDate(now.getDate()-now.getDay());tSun.setHours(0,0,0,0);
    const cSun=new Date(cl);cSun.setDate(cl.getDate()-cl.getDay());cSun.setHours(0,0,0,0);
    setWeekOffset(Math.round((cSun-tSun)/(7*86400000)));setHighlightDate(ds);switchTab("week");
  }
  function saveEvent(f){setEvents(p=>{const e=p.find(x=>x.id===f.id);return e?p.map(x=>x.id===f.id?f:x):[...p,f];});setShowEventModal(false);setEditEvent(null);setPrefillDate(null);}
  function delEvent(id){setEvents(p=>p.filter(e=>e.id!==id));setShowEventModal(false);setEditEvent(null);}
  function defLists(){try{return JSON.parse(localStorage.getItem("taskLists7"))||[{id:"list1",name:"Uni 📚"},{id:"list2",name:"Life 🌸"}];}catch{return[{id:"list1",name:"Uni 📚"},{id:"list2",name:"Life 🌸"}];}}
  function wkLabel(){const ws=weekStart,we=new Date(ws);we.setDate(ws.getDate()+6);return`${ws.getDate()} ${MONTHS[ws.getMonth()].slice(0,3)} – ${we.getDate()} ${MONTHS[we.getMonth()].slice(0,3)}, ${ws.getFullYear()}`;}

  const urgentCount=tasks.filter(t=>!t.done&&(t.urgent||(t.dueDate&&daysUntil(t.dueDate)<0))).length;
  const TABS=[
    {id:"month",label:"Month",icon:"📅"},
    {id:"week",label:"Week",icon:"📆"},
    {id:"tasks",label:"Tasks",icon:"✅",badge:urgentCount>0?urgentCount:null},
    {id:"lists",label:"Lists",icon:"📝"},
    {id:"courses",label:"Courses",icon:"📚"},
  ];

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:P.bg,minHeight:"100vh",color:P.ink,transition:"background 0.3s,color 0.3s"}}>
      <style>{`
        *{box-sizing:border-box;}
        @keyframes slideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${P.border2};border-radius:3px;}
        .day-add{opacity:0!important;}
        div:hover>.day-add{opacity:1!important;}
        ::placeholder{color:${P.ink3};opacity:0.5;}
        input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
        button:active{transform:scale(0.96);}
        select option{background:${P.bg};color:${P.ink};}
        html{-webkit-tap-highlight-color:transparent;}
      `}</style>

      {/* ── Desktop Header ── */}
      {!mobile&&(
        <div style={{background:P.white,borderBottom:`1px solid ${P.border}`,padding:"0 22px",display:"flex",alignItems:"center",gap:4,height:54,position:"sticky",top:0,zIndex:100,boxShadow:`0 1px 8px ${P.shadow}`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginRight:14}}><AppIcon/><span style={{fontSize:16,fontWeight:800,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:"-0.02em"}}>Planner</span></div>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{position:"relative",background:tab===t.id?P.accentLight:"transparent",color:tab===t.id?P.accent:P.ink3,border:`1.5px solid ${tab===t.id?P.accentMid:"transparent"}`,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:tab===t.id?700:500,transition:"all 0.15s"}}
              onMouseEnter={e=>{if(tab!==t.id){e.currentTarget.style.background=P.bg2;e.currentTarget.style.color=P.ink2;}}}
              onMouseLeave={e=>{if(tab!==t.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color=P.ink3;}}}>
              {t.label}
              {t.badge&&<span style={{position:"absolute",top:-4,right:-4,background:P.accent,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button onClick={()=>setShowSearch(true)} style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:10,padding:"5px 13px",cursor:"pointer",fontSize:12,color:P.ink3,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border;e.currentTarget.style.color=P.ink3;}}>🔍 Search <span style={{fontSize:10,opacity:0.5}}>/</span></button>
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:`1px solid ${P.border2}`,borderRadius:10,padding:"5px 12px",cursor:"pointer",fontSize:13,color:P.ink3,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink3;}}>⚙️</button>
          {(tab==="month"||tab==="week")&&(<>
            <div style={{width:1,height:22,background:P.border,margin:"0 6px"}}/>
            <button onClick={()=>setShowCalSidebar(s=>!s)} style={{background:"transparent",border:`1.5px solid ${P.border2}`,borderRadius:10,padding:"5px 13px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:500,color:P.ink2,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.navy;e.currentTarget.style.color=P.navy;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>Calendars</button>
            <Btn onClick={()=>{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}} P={P} small>+ Event</Btn>
          </>)}
        </div>
      )}

      {/* Desktop sub-nav */}
      {!mobile&&(tab==="month"||tab==="week")&&(
        <div style={{background:P.white,borderBottom:`1px solid ${P.border}`,padding:"8px 22px",display:"flex",alignItems:"center",gap:10}}>
          {tab==="month"&&(<>
            <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
            <div style={{fontSize:17,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:190,textAlign:"center"}}>{MONTHS[month]} {year}</div>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
            <Btn onClick={()=>{setMonth(new Date().getMonth());setYear(new Date().getFullYear());}} variant="ghost" small P={P}>Today</Btn>
          </>)}
          {tab==="week"&&(<>
            <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>‹</button>
            <div style={{fontSize:17,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",minWidth:250,textAlign:"center"}}>{wkLabel()}</div>
            <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor=P.accent;e.currentTarget.style.color=P.accent;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=P.border2;e.currentTarget.style.color=P.ink2;}}>›</button>
            <Btn onClick={()=>{setWeekOffset(0);setHighlightDate(null);}} variant="ghost" small P={P}>This Week</Btn>
          </>)}
          <div style={{marginLeft:"auto",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>Press <kbd style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:4,padding:"1px 5px",fontSize:10}}>N</kbd> to add · <kbd style={{background:P.bg2,border:`1px solid ${P.border}`,borderRadius:4,padding:"1px 5px",fontSize:10}}>/</kbd> to search</div>
        </div>
      )}

      {/* Content */}
      <div style={{padding:mobile?"14px 14px 80px":"22px",display:"flex",gap:18}}>
        {!mobile&&(tab==="month"||tab==="week")&&showCalSidebar&&(
          <div style={{width:210,background:P.white,borderRadius:R,border:`1px solid ${P.border}`,padding:16,flexShrink:0,boxShadow:`0 4px 20px ${P.shadow}`,animation:"slideUp 0.25s ease both",alignSelf:"flex-start"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Calendars</div>
              <button onClick={()=>setShowCalSidebar(false)} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:17}}>✕</button>
            </div>
            {calendars.map(c=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,fontFamily:"'DM Sans',sans-serif",color:P.ink}}>{c.name}</span>
                <input type="color" value={c.color} onChange={e=>setCalendars(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} style={{width:20,height:20,border:"none",background:"none",cursor:"pointer",padding:0}}/>
                {calendars.length>1&&<button onClick={()=>setCalendars(p=>p.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",cursor:"pointer",color:P.ink3,fontSize:12}} onMouseEnter={e=>e.currentTarget.style.color=P.accent} onMouseLeave={e=>e.currentTarget.style.color=P.ink3}>✕</button>}
              </div>
            ))}
          </div>
        )}
        <div style={{flex:1,minWidth:0}}>
          {/* Mobile header */}
          {mobile&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><AppIcon/><span style={{fontSize:16,fontWeight:800,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:"-0.02em"}}>Planner</span></div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setShowSearch(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:P.ink3}}>🔍</button>
                <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:P.ink3}}>⚙️</button>
                {(tab==="month"||tab==="week")&&<Btn onClick={()=>{setEditEvent(null);setPrefillDate(null);setShowEventModal(true);}} P={P} small>+ Event</Btn>}
              </div>
            </div>
          )}
          {/* Mobile calendar nav */}
          {mobile&&(tab==="month"||tab==="week")&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              {tab==="month"&&(<>
                <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{flex:1,fontSize:15,fontWeight:700,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center"}}>{MONTHS[month].slice(0,3)} {year}</div>
                <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
                <button onClick={()=>{setMonth(new Date().getMonth());setYear(new Date().getFullYear());}} style={{background:"none",border:`1px solid ${P.border2}`,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,color:P.ink3,fontFamily:"'DM Sans',sans-serif"}}>Today</button>
              </>)}
              {tab==="week"&&(<>
                <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                <div style={{flex:1,fontSize:13,fontWeight:600,color:P.ink,fontFamily:"'Plus Jakarta Sans',sans-serif",textAlign:"center"}}>{wkLabel()}</div>
                <button onClick={()=>setWeekOffset(w=>w+1)} style={{background:"none",border:`1.5px solid ${P.border2}`,borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:P.ink2,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
              </>)}
            </div>
          )}
          {tab==="month"&&<MonthView key={tabKey} year={year} month={month} events={events} tasks={tasks} calendars={calendars} onDayClick={handleDayClick} onEventClick={ev=>{setEditEvent(ev);setShowEventModal(true);}} onAddEvent={ds=>{setPrefillDate(ds);setEditEvent(null);setShowEventModal(true);}} P={P} mobile={mobile}/>}
          {tab==="week"&&<WeekView key={tabKey} weekStart={weekStart} events={events} tasks={tasks} calendars={calendars} highlightDate={highlightDate} onEventClick={ev=>{setEditEvent(ev);setShowEventModal(true);}} onAddEvent={ds=>{setPrefillDate(ds);setEditEvent(null);setShowEventModal(true);}} onTaskToggle={id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))} onTaskEdit={t=>setEditWeekTask(t)} onAddTask={()=>setShowAddTask(true)} P={P} mobile={mobile}/>}
          {tab==="tasks"&&<TasksView key={tabKey} tasks={tasks} setTasks={setTasks} P={P} mobile={mobile}/>}
          {tab==="lists"&&<SimpleListsView key={tabKey} simpleLists={simpleLists} setSimpleLists={setSimpleLists} P={P} mobile={mobile}/>}
          {tab==="courses"&&<CourseTracker key={tabKey} P={P} mobile={mobile}/>}
        </div>
      </div>

      {/* ── Mobile bottom tab bar ── */}
      {mobile&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:P.white,borderTop:`1px solid ${P.border}`,display:"flex",zIndex:100,boxShadow:`0 -4px 20px ${P.shadow}`,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"10px 4px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",transition:"all 0.15s"}}>
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontSize:9,fontWeight:tab===t.id?700:400,color:tab===t.id?P.accent:P.ink3,fontFamily:"'DM Sans',sans-serif",letterSpacing:"0.03em"}}>{t.label}</span>
              {tab===t.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:P.accent,borderRadius:"0 0 2px 2px"}}/>}
              {t.badge&&<span style={{position:"absolute",top:6,right:6,background:P.accent,color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
            </button>
          ))}
        </div>
      )}

      {/* Modals */}
      {showEventModal&&<EventModal event={editEvent||(prefillDate?{id:Date.now().toString(),title:"",calendarId:calendars[0]?.id||"",date:prefillDate,startTime:"",endTime:"",isSingleTime:false,location:"",notes:"",links:"",isMultiDay:false,multiDayEnd:"",showColorFill:false,urgent:false,done:false}:null)} calendars={calendars} onSave={saveEvent} onDelete={delEvent} onClose={()=>{setShowEventModal(false);setEditEvent(null);setPrefillDate(null);}} P={P} mobile={mobile}/>}
      {showAddTask&&<TaskModal task={null} lists={defLists()} onSave={f=>{setTasks(p=>[...p,f]);setShowAddTask(false);}} onDelete={()=>{}} onClose={()=>setShowAddTask(false)} P={P} mobile={mobile}/>}
      {editWeekTask&&<TaskModal task={editWeekTask} lists={defLists()} onSave={f=>{setTasks(p=>p.map(t=>t.id===f.id?f:t));setEditWeekTask(null);}} onDelete={id=>{setTasks(p=>p.filter(t=>t.id!==id));setEditWeekTask(null);}} onClose={()=>setEditWeekTask(null)} P={P} mobile={mobile}/>}
      {showSearch&&<SearchBar events={events} tasks={tasks} calendars={calendars} onClose={()=>setShowSearch(false)} P={P} mobile={mobile}/>}
      {showSettings&&<SettingsPanel dark={dark} setDark={setDark} accent={accent} setAccent={setAccent} onReset={doReset} onClose={()=>setShowSettings(false)} P={P} mobile={mobile}/>}
      <SyncIndicator syncing={syncing} P={P}/>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
